<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Weekly Newsletter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f5f0;
            font-family: Georgia, serif;
        }
        .newsletter-header {
            border-bottom: 2px solid #000;
            border-top: 2px solid #000;
            padding: 20px 0;
            margin-bottom: 40px;
        }
        .issue-badge {
            background-color: #000;
            color: #fff;
            padding: 4px 12px;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }
        .collage-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 4px;
        }
        .member-name {
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 1px solid #ccc;
            padding-bottom: 8px;
            margin-bottom: 12px;
        }
        .summary-text {
            font-size: 1rem;
            line-height: 1.8;
            color: #333;
        }
        .group-summary {
            background-color: #fff;
            border-left: 4px solid #000;
            padding: 24px;
            font-size: 1.05rem;
            line-height: 1.9;
            color: #333;
            margin-top: 40px;
        }
        .section-title {
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
<div class="container py-5">

    <!-- Header -->
    <div class="newsletter-header">
        <div class="d-flex justify-content-between align-items-start">
            <div>
                <h1 class="display-4 fw-bold mb-0">Weekly</h1>
                <h1 class="display-4 fw-bold">Newsletter</h1>
            </div>
            <div class="text-end">
                <span class="issue-badge">GROUP #<span th:text="${groupId}"></span></span>
                <p class="mt-2 mb-0 text-muted"
                   th:text="${#temporals.format(weekStart, 'dd MMMM yyyy')}"></p>
            </div>
        </div>
    </div>

    <!-- No content fallback -->
    <div th:if="${summaries.isEmpty()}" class="text-center py-5">
        <p class="text-muted">No moments were posted this week yet.</p>
    </div>

    <div th:unless="${summaries.isEmpty()}">

        <!-- Shuffled photo collage -->
        <p class="section-title">This week's moments</p>
        <div class="row g-2 mb-5">
            <div th:each="imageUrl : ${allImageUrls}" class="col-6 col-md-4 col-lg-3">
                <img th:src="${imageUrl}" class="collage-img" alt="Moment"/>
            </div>
        </div>

        <!-- Per user summaries -->
        <p class="section-title">What everyone got up to</p>
        <div th:each="entry : ${summaries}" class="mb-4">
            <div class="member-name" th:text="${entry.key.username}"></div>
            <p class="summary-text" th:text="${entry.value}"></p>
            <hr/>
        </div>

        <!-- Overall group summary -->
        <p class="section-title">Until next week</p>
        <div class="group-summary" th:text="${groupSummary}"></div>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
