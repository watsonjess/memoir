<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<th:block layout:fragment="styles">
  <style>
    .current-header {
      margin-top: 32px;
      margin-bottom: 32px;
    }
    .current-kicker {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--memoir-accent);
      margin-bottom: 0.35rem;
    }
    .current-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 24px;
    }
    .current-card {
      border: 1px solid var(--memoir-border);
      border-radius: 16px;
      padding: 24px;
      background: var(--memoir-surface);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .current-card-group {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 600;
    }
    .current-card-date {
      font-size: 0.8rem;
      color: var(--memoir-muted);
    }
    .current-card-links {
      display: flex;
      gap: 10px;
      margin-top: auto;
    }
    .current-card-link {
      flex: 1;
      text-align: center;
      padding: 10px 0;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 500;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .current-card-link:hover { opacity: 0.8; }
    .current-card-link--html {
      background: var(--memoir-accent);
      color: #fff;
    }
    .current-card-link--pdf {
      background: #f0f0f0;
      color: var(--memoir-ink);
    }
    .current-empty {
      text-align: center;
      padding: 80px 0;
      color: var(--memoir-muted);
    }
    .current-empty i {
      font-size: 2.5rem;
      margin-bottom: 16px;
      display: block;
    }
  </style>
</th:block>

<th:block layout:fragment="content">
  <div class="current-header">
    <p class="current-kicker">This week</p>
    <h1 class="memoir-page-title">Current Newsletters</h1>
    <p class="memoir-page-subtitle">The latest newsletter from each of your groups.</p>
  </div>

  <div th:if="${newsletters.isEmpty()}" class="current-empty">
    <i class="bi bi-newspaper"></i>
    <p>No newsletters have been sent yet.</p>
    <p class="small">Newsletters are generated at the end of each week.</p>
  </div>

  <div th:unless="${newsletters.isEmpty()}" class="current-grid">
    <div th:each="nl : ${newsletters}" class="current-card">
      <div>
        <div class="current-card-group" th:text="${nl.group.name}"></div>
        <div class="current-card-date"
             th:text="${'Sent ' + #temporals.format(nl.sentAt, 'dd MMMM yyyy')}"></div>
      </div>
      <div class="current-card-links">
        <a th:href="@{/newsletter/group/{id}(id=${nl.group.id})}"
           class="current-card-link current-card-link--html">
          <i class="bi bi-eye"></i> View
        </a>
        <a th:if="${nl.pdfUrl != null}"
           th:href="${nl.pdfUrl}"
           target="_blank"
           class="current-card-link current-card-link--pdf">
          <i class="bi bi-download"></i> PDF
        </a>
      </div>
    </div>
  </div>
</th:block>

</html>
