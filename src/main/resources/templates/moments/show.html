<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<th:block layout:fragment="styles">
  <style>
    .moment-card {
      max-width: 680px;
      margin: 40px auto;
    }
    .moment-image {
      width: 100%;
      border-radius: 12px;
      object-fit: cover;
      max-height: 480px;
    }
    .moment-meta {
      color: #888;
      font-size: 0.9rem;
      margin-top: 16px;
    }
    .moment-content {
      font-size: 1.1rem;
      line-height: 1.8;
      margin-top: 16px;
      color: #333;
    }
    .moment-location {
      font-size: 0.9rem;
      color: #888;
      margin-top: 8px;
    }
    .back-link {
      display: inline-block;
      margin-bottom: 24px;
      color: #888;
      font-size: 0.9rem;
      text-decoration: none;
    }
    .back-link:hover {
      color: #333;
    }
  </style>
</th:block>

<th:block layout:fragment="content">
  <div class="moment-card">
    <a th:href="@{/moments}" class="back-link">
      <i class="bi bi-arrow-left"></i> Back to moments
    </a>

    <img th:src="${moment.imageUrl}"
         th:alt="${moment.content}"
         class="moment-image"/>

    <div class="moment-meta">
      <span th:text="${#temporals.format(moment.createdAt, 'dd MMMM yyyy')}"></span>
      <span th:if="${moment.location != null}">
                · <i class="bi bi-geo-alt"></i>
                <span th:text="${moment.location}"></span>
            </span>
    </div>

    <p class="moment-content" th:text="${moment.content}"></p>
  </div>
</th:block>

</html>
