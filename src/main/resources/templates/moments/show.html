<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<th:block layout:fragment="styles">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    .moment-card {
      max-width: 680px;
      margin: 40px auto;
    }
    .moment-image {
      width: 100%;
      border-radius: 12px;
      object-fit: cover;
      max-height: 480px;
    }
    .moment-meta {
      color: #888;
      font-size: 0.9rem;
      margin-top: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .moment-meta-left {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .moment-content {
      font-size: 1.1rem;
      line-height: 1.8;
      margin-top: 16px;
      color: #333;
    }
    .moment-location {
      font-size: 0.9rem;
      color: #888;
      margin-top: 8px;
    }
    .back-link {
      display: inline-block;
      margin-bottom: 24px;
      color: #888;
      font-size: 0.9rem;
      text-decoration: none;
    }
    .back-link:hover { color: #333; }
    .moment-map {
      width: 100%;
      height: 220px;
      border-radius: 10px;
      margin-top: 20px;
      overflow: hidden;
    }
    .edit-link {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--memoir-accent);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border: 1px solid var(--memoir-accent);
      padding: 4px 10px;
      border-radius: 20px;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .edit-link:hover {
      background: var(--memoir-accent);
      color: #fff;
    }
  </style>
</th:block>

<th:block layout:fragment="content">
  <div class="moment-card">
    <a th:href="@{/moments}" class="back-link">
      <i class="bi bi-arrow-left"></i> Back to moments
    </a>

    <img th:src="${moment.imageUrl}"
         th:alt="${moment.content}"
         class="moment-image"/>

    <div class="moment-meta">
      <div class="moment-meta-left">
        <span th:text="${#temporals.format(moment.createdAt, 'dd MMMM yyyy')}"></span>
        <span th:if="${moment.location != null}">
          · <i class="bi bi-geo-alt"></i>
          <span th:text="${moment.location.split(',')[0]}"></span>
        </span>
      </div>

      <!-- Edit button — only shown if editable today -->
      <a th:if="${isEditable}"
         th:href="@{/moments/{id}/edit(id=${moment.id})}"
         class="edit-link">
        <i class="bi bi-pencil"></i> Edit
      </a>
    </div>

    <p class="moment-content" th:text="${moment.content}"></p>

    <!-- Mini map — only shown if location exists -->
    <div th:if="${moment.latitude != null and moment.longitude != null}"
         id="momentMap"
         class="moment-map"></div>
  </div>
</th:block>

<th:block layout:fragment="scripts">
  <script th:if="${moment.latitude != null and moment.longitude != null}"
          src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script th:if="${moment.latitude != null and moment.longitude != null}"
          th:inline="javascript">
    const lat = /*[[${moment.latitude}]]*/ 0;
    const lng = /*[[${moment.longitude}]]*/ 0;
    const locationName = /*[[${moment.location}]]*/ '';

    const map = L.map('momentMap', {
      zoomControl: false,
      dragging: false,
      scrollWheelZoom: false,
      doubleClickZoom: false
    });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);

    map.setView([lat, lng], 14);

    L.circleMarker([lat, lng], {
      radius: 9,
      color: '#C1603A',
      fillColor: '#C1603A',
      fillOpacity: 0.85,
      weight: 2
    }).bindPopup(locationName.split(',').slice(0, 2).join(',')).addTo(map);
  </script>
</th:block>

</html>
