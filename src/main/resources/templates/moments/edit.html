<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<head>
    <title>Edit Moment</title>
</head>

<th:block layout:fragment="styles">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        .moment-form-card {
          max-width: 600px;
          margin: 40px auto;
          background: #fff;
          border-radius: 12px;
          padding: 40px;
          box-shadow: 0 2px 12px rgba(0,0,0,0.07);
        }
        .moment-form-title {
          font-family: 'Playfair Display', serif;
          font-size: 1.8rem;
          margin-bottom: 8px;
        }
        .moment-form-subtitle {
          color: #888;
          font-size: 0.95rem;
          margin-bottom: 32px;
        }
        .image-preview-box {
          width: 100%;
          height: 240px;
          border: 2px dashed #ddd;
          border-radius: 8px;
          display: flex;
          align-items: center;
          justify-content: center;
          overflow: hidden;
          cursor: pointer;
          margin-bottom: 24px;
          background-color: #fafafa;
          transition: border-color 0.2s;
          position: relative;
        }
        .image-preview-box:hover { border-color: #aaa; }
        .image-preview-box img {
          width: 100%;
          height: 100%;
          object-fit: cover;
        }
        .image-preview-placeholder {
          text-align: center;
          color: #aaa;
        }
        .image-preview-placeholder i {
          font-size: 2rem;
          margin-bottom: 8px;
        }
        .image-change-hint {
          position: absolute;
          bottom: 0;
          left: 0;
          right: 0;
          background: rgba(0,0,0,0.5);
          color: #fff;
          text-align: center;
          font-size: 0.8rem;
          padding: 6px;
          opacity: 0;
          transition: opacity 0.2s;
        }
        .image-preview-box:hover .image-change-hint { opacity: 1; }
        .form-label { font-weight: 500; margin-bottom: 6px; }
        .btn-memoir-submit {
          background-color: #c1603a;
          color: #fff;
          border: none;
          padding: 12px 32px;
          border-radius: 8px;
          font-size: 1rem;
          width: 100%;
          transition: background-color 0.2s;
        }
        .btn-memoir-submit:hover { background-color: #333; color: #fff; }
    </style>
</th:block>

<th:block layout:fragment="content">
    <div class="moment-form-card">
        <h1 class="moment-form-title">Edit Moment</h1>
        <p class="moment-form-subtitle">You can edit today's moment</p>

        <form th:action="@{/moments/{id}/edit(id=${moment.id})}"
              method="post"
              enctype="multipart/form-data">

            <!-- Image — click to replace -->
            <div class="image-preview-box" onclick="document.getElementById('imageInput').click()">
                <img th:if="${moment.imageUrl != null}"
                     th:src="${moment.imageUrl}"
                     id="imagePreview"
                     alt="Current image"/>
                <div class="image-preview-placeholder"
                     th:if="${moment.imageUrl == null}"
                     id="imagePlaceholder">
                    <i class="bi bi-camera"></i>
                    <p class="mb-0">Click to upload a photo</p>
                </div>
                <!-- Shows on hover if image exists -->
                <div class="image-change-hint" th:if="${moment.imageUrl != null}">
                    <i class="bi bi-camera me-1"></i> Click to change photo
                </div>
            </div>
            <input type="file"
                   id="imageInput"
                   name="image"
                   accept="image/*"
                   style="display:none;"/>

            <!-- Description -->
            <div class="mb-3">
                <label class="form-label" for="content">Description</label>
                <textarea class="form-control"
                          id="content"
                          name="content"
                          rows="3"
                          th:text="${moment.content}"></textarea>
            </div>

            <!-- Location search -->
            <div class="mb-4">
                <label class="form-label" for="locationSearch">
                    Location <span class="text-muted fw-normal">(optional)</span>
                </label>
                <div class="input-group">
                    <input type="text"
                           class="form-control"
                           id="locationSearch"
                           th:placeholder="${moment.location != null ? moment.location : 'Search for a location…'}"
                           autocomplete="off"/>
                    <button class="btn btn-outline-secondary" type="button" id="locateBtn">
                        <i class="bi bi-search"></i>
                    </button>
                    <button class="btn btn-outline-secondary" type="button" id="gpsBtn"
                            title="Use my current location">
                        <i class="bi bi-crosshair"></i>
                    </button>
                </div>

                <!-- Location error -->
                <div id="locationError" class="text-danger small mt-1" style="display:none;">
                    <i class="bi bi-exclamation-circle me-1"></i> Please select a location from the results
                </div>

                <div id="locationResults" class="list-group mt-1" style="display:none;"></div>

                <!-- Hidden fields -->
                <input type="hidden" id="location"  name="location"  th:value="${moment.location}"/>
                <input type="hidden" id="latitude"  name="latitude"  th:value="${moment.latitude}"/>
                <input type="hidden" id="longitude" name="longitude" th:value="${moment.longitude}"/>

                <!-- Current location display -->
                <div id="locationSelected" class="mt-2"
                     th:style="${moment.location != null} ? 'display:block' : 'display:none'">
          <span class="badge rounded-pill"
                style="background:#f8fdf9; border:1px solid #c3e6cb;
                       color:#2d6a4f; font-weight:400; font-size:0.8rem; padding: 6px 10px;">
            <i class="bi bi-geo-alt-fill me-1"></i>
            <span id="locationSelectedLabel"
                  th:text="${moment.location != null ? moment.location.split(',')[0] : ''}"></span>
            <button type="button" class="btn-close btn-close-sm ms-1"
                    id="clearLocation" style="font-size:0.6rem;"></button>
          </span>
                </div>

                <!-- Mini preview map -->
                <div id="locationMapPreview" class="mt-3 overflow-hidden"
                     th:style="${moment.latitude != null} ? 'height:200px; border-radius:8px; display:block' : 'display:none'"></div>
            </div>

            <!-- Actions -->
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-memoir-submit flex-grow-1">
                    Save changes
                </button>
                <a href="javascript:history.back()" class="btn btn-outline-secondary text-center"
                   style="text-align: center; display: flex; align-items: center; justify-content: center;">
                    Cancel
                </a>
            </div>

        </form>
    </div>
</th:block>

<th:block layout:fragment="scripts">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script th:inline="javascript">
        // ── Image preview ─────────────────────────────────────
        document.getElementById('imageInput').addEventListener('change', function(e) {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = function(event) {
            let preview = document.getElementById('imagePreview');
            const placeholder = document.getElementById('imagePlaceholder');

            if (!preview) {
              preview = document.createElement('img');
              preview.id = 'imagePreview';
              preview.alt = 'Preview';
              preview.style.cssText = 'width:100%;height:100%;object-fit:cover;';
              document.querySelector('.image-preview-box').prepend(preview);
            }
            preview.src = event.target.result;
            if (placeholder) placeholder.style.display = 'none';
          };
          reader.readAsDataURL(file);
        });

        // ── Location search ───────────────────────────────────
        let previewMap    = null;
        let previewMarker = null;
        let debounce      = null;

        const locationSearch  = document.getElementById('locationSearch');
        const locationResults = document.getElementById('locationResults');
        const locationField   = document.getElementById('location');
        const latField        = document.getElementById('latitude');
        const lngField        = document.getElementById('longitude');
        const selectedBox     = document.getElementById('locationSelected');
        const selectedLabel   = document.getElementById('locationSelectedLabel');
        const clearBtn        = document.getElementById('clearLocation');
        const locateBtn       = document.getElementById('locateBtn');
        const gpsBtn          = document.getElementById('gpsBtn');
        const mapPreview      = document.getElementById('locationMapPreview');

        // If moment already has coordinates, show map on load
        const existingLat = /*[[${moment.latitude}]]*/ null;
        const existingLng = /*[[${moment.longitude}]]*/ null;

        if (existingLat && existingLng) {
          mapPreview.style.display = 'block';
          mapPreview.style.height  = '200px';
          mapPreview.style.borderRadius = '8px';
          previewMap = L.map('locationMapPreview', {
            zoomControl: false, dragging: false, scrollWheelZoom: false
          });
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(previewMap);
          previewMap.setView([existingLat, existingLng], 13);
          previewMarker = L.circleMarker([existingLat, existingLng], {
            radius: 8, color: '#C1603A', fillColor: '#C1603A', fillOpacity: 0.8
          }).addTo(previewMap);
          setTimeout(() => previewMap.invalidateSize(), 100);
        }

        async function searchLocation(query) {
          if (!query.trim()) { locationResults.style.display = 'none'; return; }
          try {
            const res = await fetch(
              `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=5`,
              { headers: { 'Accept-Language': 'en' } }
            );
            renderResults(await res.json());
          } catch (e) {
            console.warn('Geocoding failed:', e);
          }
        }

        function renderResults(results) {
          if (!results.length) {
            locationResults.innerHTML = '<div class="list-group-item text-muted small">No results found</div>';
            locationResults.style.display = 'block';
            return;
          }
          locationResults.innerHTML = results.map(r => `
            <button type="button" class="list-group-item list-group-item-action small"
                    data-lat="${r.lat}" data-lng="${r.lon}" data-name="${r.display_name}">
              <i class="bi bi-geo-alt me-2 text-muted"></i>${r.display_name}
            </button>
          `).join('');
          locationResults.style.display = 'block';
          locationResults.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => selectLocation(
              btn.dataset.name,
              parseFloat(btn.dataset.lat),
              parseFloat(btn.dataset.lng)
            ));
          });
        }

        function selectLocation(name, lat, lng) {
          locationField.value = name;
          latField.value      = lat;
          lngField.value      = lng;
          document.getElementById('locationError').style.display = 'none';
          selectedLabel.textContent = name.split(',').slice(0, 3).join(',');
          selectedBox.style.display = 'block';
          locationResults.style.display = 'none';
          locationSearch.value = '';
          mapPreview.style.display      = 'block';
          mapPreview.style.height       = '200px';
          mapPreview.style.borderRadius = '8px';
          if (!previewMap) {
            previewMap = L.map('locationMapPreview', {
              zoomControl: false, dragging: false, scrollWheelZoom: false
            });
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(previewMap);
          }
          previewMap.setView([lat, lng], 13);
          if (previewMarker) previewMarker.remove();
          previewMarker = L.circleMarker([lat, lng], {
            radius: 8, color: '#C1603A', fillColor: '#C1603A', fillOpacity: 0.8
          }).addTo(previewMap);
          setTimeout(() => previewMap.invalidateSize(), 100);
        }

        clearBtn.addEventListener('click', () => {
          locationField.value = '';
          latField.value      = '';
          lngField.value      = '';
          selectedBox.style.display = 'none';
          mapPreview.style.display  = 'none';
          locationSearch.placeholder = 'Search for a location…';
        });

        locationSearch.addEventListener('input', () => {
          clearTimeout(debounce);
          debounce = setTimeout(() => searchLocation(locationSearch.value), 350);
        });

        locateBtn.addEventListener('click', () => searchLocation(locationSearch.value));

        // GPS button
        gpsBtn.addEventListener('click', () => {
          if (!navigator.geolocation) {
            alert('Geolocation is not supported by your browser.');
            return;
          }
          gpsBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
          gpsBtn.disabled = true;
          navigator.geolocation.getCurrentPosition(
            async (position) => {
              const lat = position.coords.latitude;
              const lng = position.coords.longitude;
              try {
                const res = await fetch(
                  `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`,
                  { headers: { 'Accept-Language': 'en' } }
                );
                const data = await res.json();
                selectLocation(data.display_name, lat, lng);
              } catch (e) {
                selectLocation(`${lat.toFixed(4)}, ${lng.toFixed(4)}`, lat, lng);
              }
              gpsBtn.innerHTML = '<i class="bi bi-crosshair"></i>';
              gpsBtn.disabled = false;
            },
            (error) => {
              gpsBtn.innerHTML = '<i class="bi bi-crosshair"></i>';
              gpsBtn.disabled = false;
              switch (error.code) {
                case error.PERMISSION_DENIED:
                  alert('Location access was denied. Please use the search box instead.');
                  break;
                case error.POSITION_UNAVAILABLE:
                  alert('Location unavailable on this device. Please use the search box instead.');
                  break;
                default:
                  alert('Could not get your location. Please use the search box instead.');
              }
            },
            { enableHighAccuracy: true, timeout: 10000 }
          );
        });

        document.addEventListener('click', (e) => {
          if (!locationSearch.contains(e.target) && !locationResults.contains(e.target)) {
            locationResults.style.display = 'none';
          }
        });
    </script>
</th:block>

</html>
