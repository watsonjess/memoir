<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
  <title>Event</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>
<body>

<div layout:fragment="content">

  <!-- Page header -->
  <div class="mb-4">
    <a th:href="@{/events}" class="text-muted small text-decoration-none">
      <i class="bi bi-arrow-left me-1"></i> Back to events
    </a>
    <div class="d-flex justify-content-between align-items-start mt-2">
      <div>
        <h1 class="memoir-page-title" th:text="${event.name}">Event name</h1>
        <p class="memoir-page-subtitle" th:text="${event.description}"
           th:if="${event.description}"></p>
      </div>
      <!-- Delete button -->
      <form th:action="@{/groups/{gid}/events/{id}/delete(gid=${event.group.id}, id=${event.id})}"
            method="post"
            onsubmit="return confirm('Are you sure you want to delete this event?')">
        <button type="submit" class="btn btn-sm btn-outline-danger mt-2">
          <i class="bi bi-trash"></i> Delete
        </button>
      </form>
    </div>
  </div>

  <div class="row g-4">

    <!-- Left: event info + map -->
    <div class="col-md-4">

      <!-- Event details card -->
      <div class="memoir-card mb-3">
        <h6 class="text-muted small mb-3">Event details</h6>

        <!-- Group -->
        <div class="d-flex gap-2 mb-2">
          <i class="bi bi-people mt-1" style="color: var(--memoir-accent)"></i>
          <div class="small" th:text="${event.group.name}"></div>
        </div>

        <!-- Date range -->
        <div class="d-flex gap-2 mb-2">
          <i class="bi bi-calendar3 mt-1" style="color: var(--memoir-accent)"></i>
          <div>
            <div class="small fw-500"
                 th:text="${#temporals.format(event.startDate, 'd MMM yyyy')}">
            </div>
            <div class="small text-muted" th:if="${event.endDate != null}">
              to <span th:text="${#temporals.format(event.endDate, 'd MMM yyyy')}"></span>
            </div>
          </div>
        </div>

        <!-- Location -->
        <div class="d-flex gap-2" th:if="${event.location}">
          <i class="bi bi-geo-alt mt-1" style="color: var(--memoir-accent)"></i>
          <div class="small" th:text="${event.location.split(',')[0]}"></div>
        </div>
      </div>

      <!-- Mini map -->
      <div th:if="${event.latitude != null}"
           class="memoir-card p-0 overflow-hidden mb-3">
        <div id="eventMap" style="height: 200px; border-radius: 12px;"></div>
      </div>

      <!-- Edit button -->
      <a th:href="@{/groups/{gid}/events/{id}/edit(gid=${event.group.id}, id=${event.id})}"
         class="btn btn-outline-secondary btn-sm w-100">
        <i class="bi bi-pencil me-1"></i> Edit event
      </a>

    </div>

    <!-- Right: moments grid -->
    <div class="col-md-8">
      <div class="memoir-card">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h5 class="mb-0">
            Moments
            <span class="text-muted small ms-1"
                  th:unless="${#lists.isEmpty(moments)}"
                  th:text="'(' + ${moments.size()} + ')'"></span>
          </h5>
          <a th:href="@{/moments/new(groupId=${event.group.id}, eventId=${event.id})}"
             class="btn btn-memoir btn-sm">
            <i class="bi bi-plus-lg me-1"></i> Add moment
          </a>
        </div>

        <!-- Empty state -->
        <div th:if="${#lists.isEmpty(moments)}" class="text-center py-4">
          <i class="bi bi-images fs-1 d-block mb-3" style="color: var(--memoir-muted)"></i>
          <p class="text-muted small mb-3">No moments yet for this event</p>
          <a th:href="@{/moments/new(groupId=${event.group.id}, eventId=${event.id})}"
             class="btn btn-memoir btn-sm">
            Add the first moment
          </a>
        </div>

        <!-- Moments grid -->
        <div class="row g-2" th:unless="${#lists.isEmpty(moments)}">
          <div class="col-6 col-md-4" th:each="moment : ${moments}">
            <div style="border: 1px solid var(--memoir-border); border-radius: 10px;
                                    overflow: hidden; background: var(--memoir-surface);">

              <!-- Photo moment -->
              <img th:if="${moment.imageUrl != null}"
                   th:src="${moment.imageUrl}"
                   class="img-fluid"
                   style="width:100%; height:140px; object-fit:cover; display:block;"
                   th:alt="${moment.content}"/>

              <!-- Note moment (no image) -->
              <div th:if="${moment.imageUrl == null}"
                   style="background: var(--memoir-cream); height:140px;
                                        display:flex; align-items:center; padding: 12px;">
                <p class="small mb-0" th:text="${moment.content}"></p>
              </div>

              <!-- Caption / meta -->
              <div style="padding: 8px 10px;">
                <p class="small mb-1"
                   th:if="${moment.content != null and moment.imageUrl != null}"
                   th:text="${moment.content}"
                   style="color: var(--memoir-ink); margin:0 0 4px;
                                          white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                </p>
                <div class="d-flex justify-content-between align-items-center">
                                    <span style="font-size:0.7rem; color: var(--memoir-muted)"
                                          th:text="${moment.createdBy.firstname}"></span>
                  <span style="font-size:0.7rem; color: var(--memoir-muted)"
                        th:text="${#temporals.format(moment.createdAt, 'd MMM')}"></span>
                </div>
              </div>

            </div>
          </div>
        </div>

      </div>
    </div>

  </div>

</div>

<th:block layout:fragment="scripts">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script th:if="${event.latitude != null}" th:inline="javascript">
    const lat  = /*[[${event.latitude}]]*/ 0;
    const lng  = /*[[${event.longitude}]]*/ 0;
    const name = /*[[${event.name}]]*/ '';

    const map = L.map('eventMap', {
      zoomControl: false,
      dragging: false,
      scrollWheelZoom: false
    });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    map.setView([lat, lng], 12);

    L.circleMarker([lat, lng], {
      radius: 8,
      color: '#C1603A',
      fillColor: '#C1603A',
      fillOpacity: 0.8
    }).addTo(map).bindPopup(name).openPopup();
  </script>
</th:block>

</body>
</html>
