<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
  <title>Event</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
</head>
<body>

<div layout:fragment="content">

  <!-- Page header -->
  <div class="mb-3">
    <a th:href="@{/events}" class="text-muted small text-decoration-none">
      <i class="bi bi-arrow-left me-1"></i> Back to events
    </a>
    <div class="d-flex justify-content-between align-items-start mt-2">
      <div>
        <h1 class="memoir-page-title" th:text="${event.name}">Event name</h1>
        <p class="memoir-page-subtitle" th:text="${event.description}"
           th:if="${event.description}"></p>
      </div>
      <div class="d-flex gap-2 mt-2">
        <!-- <a th:href="@{/groups/{gid}/events/{id}/edit(gid=${event.group.id}, id=${event.id})}"
           class="btn btn-outline-secondary btn-sm">
          <i class="bi bi-pencil me-1"></i> Edit
        </a> -->
        <form th:action="@{/groups/{gid}/events/{id}/delete(gid=${event.group.id}, id=${event.id})}"
              method="post"
              onsubmit="return confirm('Are you sure you want to delete this event?')">
          <button type="submit" class="btn btn-sm btn-outline-danger">
            <i class="bi bi-trash"></i> Delete
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Event details strip -->
  <div class="memoir-card mb-4 d-flex flex-wrap gap-4">
    <div class="d-flex gap-2 align-items-center">
      <i class="bi bi-people" style="color: var(--memoir-accent)"></i>
      <span class="small" th:text="${event.group.name}"></span>
    </div>
    <div class="d-flex gap-2 align-items-center">
      <i class="bi bi-calendar3" style="color: var(--memoir-accent)"></i>
      <span class="small">
                <span th:text="${#temporals.format(event.startDate, 'd MMM yyyy')}"></span>
                <span th:if="${event.endDate != null}">
                    &rarr; <span th:text="${#temporals.format(event.endDate, 'd MMM yyyy')}"></span>
                </span>
            </span>
    </div>
    <div class="d-flex gap-2 align-items-center" th:if="${event.location}">
      <i class="bi bi-geo-alt" style="color: var(--memoir-accent)"></i>
      <span class="small" th:text="${event.location.split(',')[0]}"></span>
    </div>
    <div class="ms-auto">
      <a th:href="@{/moments/new(groupId=${event.group.id}, eventId=${event.id})}"
         class="btn btn-memoir btn-sm">
        <i class="bi bi-plus-lg me-1"></i> Add moment
      </a>
    </div>
  </div>

  <!-- Map -->
  <div class="memoir-card p-0 overflow-hidden mb-4"
       th:if="${event.latitude != null or not #lists.isEmpty(moments)}">
    <div id="eventMap" style="height: 420px; width: 100%; border-radius: 12px;"></div>
  </div>

  <!-- Empty state -->
  <div th:if="${#lists.isEmpty(moments)}" class="memoir-card text-center py-5">
    <i class="bi bi-images fs-1 d-block mb-3" style="color: var(--memoir-muted)"></i>
    <p class="text-muted small mb-3">No moments yet for this event</p>
    <a th:href="@{/moments/new(groupId=${event.group.id}, eventId=${event.id})}"
       class="btn btn-memoir btn-sm">
      Add the first moment
    </a>
  </div>

  <!-- Moments grid -->
  <div class="row g-3" th:unless="${#lists.isEmpty(moments)}">
    <div class="col-6 col-md-4 col-lg-3" th:each="moment : ${moments}">
      <div class="moment-card" th:data-moment-id="${moment.id}"
           style="border: 1px solid var(--memoir-border); border-radius: 10px;
                        overflow: hidden; background: var(--memoir-surface);
                        cursor: pointer; transition: transform 0.15s, border-color 0.15s;">
        <img th:if="${moment.imageUrl != null}"
             th:src="${moment.imageUrl}"
             style="width:100%; height:160px; object-fit:cover; display:block;"
             th:alt="${moment.content}"/>
        <div th:if="${moment.imageUrl == null}"
             style="background: var(--memoir-cream); height:160px;
                            display:flex; align-items:center; padding: 16px;">
          <p class="small mb-0" th:text="${moment.content}"></p>
        </div>
        <div style="padding: 8px 10px;">
          <p class="small mb-1"
             th:if="${moment.content != null and moment.imageUrl != null}"
             th:text="${moment.content}"
             style="margin:0 0 4px; white-space:nowrap; overflow:hidden;
                              text-overflow:ellipsis; color: var(--memoir-ink);">
          </p>
          <div class="d-flex justify-content-between">
                        <span style="font-size:0.7rem; color: var(--memoir-muted)"
                              th:text="${moment.createdBy.firstname}"></span>
            <span style="font-size:0.7rem; color: var(--memoir-muted)"
                  th:text="${#temporals.format(moment.createdAt, 'd MMM')}"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div id="momentModal" style="display:none; position:fixed; inset:0; z-index:9999;
                                  background:rgba(0,0,0,0.75); align-items:center;
                                  justify-content:center; padding: 20px;">
    <div style="background: var(--memoir-surface); border-radius: 16px;
                    max-width: 600px; width: 100%; max-height: 90vh;
                    overflow-y: auto; position: relative;">
      <button id="modalClose"
              style="position:absolute; top:12px; right:12px; z-index:10;
                           background: rgba(0,0,0,0.5); border:none; color:#fff;
                           border-radius:50%; width:32px; height:32px;
                           display:flex; align-items:center; justify-content:center;
                           cursor:pointer; font-size:1rem;">
        <i class="bi bi-x"></i>
      </button>
      <img id="modalImage" src="" alt=""
           style="width:100%; max-height:400px; object-fit:cover;
                        border-radius:16px 16px 0 0; display:none;"/>
      <div id="modalNote"
           style="background: var(--memoir-cream); min-height:160px;
                        display:none; align-items:center; justify-content:center;
                        padding:32px; border-radius:16px 16px 0 0;">
        <p id="modalNoteText" class="mb-0" style="font-size:1.1rem;"></p>
      </div>
      <div style="padding: 20px 24px 24px;">
        <p id="modalContent" class="mb-3"
           style="font-size:1rem; color: var(--memoir-ink);"></p>
        <div class="d-flex justify-content-between align-items-center">
          <div>
                        <span id="modalAuthor"
                              style="font-size:0.85rem; font-weight:500; color: var(--memoir-ink);"></span>
            <span id="modalDate"
                  style="font-size:0.8rem; color: var(--memoir-muted); margin-left:8px;"></span>
          </div>
          <div id="modalLocation" style="font-size:0.8rem; color: var(--memoir-muted);">
            <i class="bi bi-geo-alt me-1"></i>
            <span id="modalLocationText"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<th:block layout:fragment="styles">
  <style>
    .moment-card:hover {
      transform: translateY(-2px);
      border-color: var(--memoir-accent) !important;
    }
    .leaflet-popup-content-wrapper {
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      min-width: 160px;
    }
    .map-pin-popup img {
      width: 100%;
      height: 100px;
      object-fit: cover;
      border-radius: 6px;
      margin-bottom: 6px;
      display: block;
    }
    .map-pin-popup-title {
      font-size: 0.85rem;
      font-weight: 500;
      color: #1C1C1A;
      margin-bottom: 2px;
    }
    .map-pin-popup-sub {
      font-size: 0.75rem;
      color: #6B6860;
    }
    .map-pin-popup-link {
      font-size: 0.75rem;
      color: #C1603A;
      text-decoration: none;
      font-weight: 500;
      display: inline-block;
      margin-top: 4px;
    }
    /* Custom cluster icon overrides */
    .marker-cluster {
      background: none !important;
    }
    .marker-cluster div {
      background: none !important;
    }
  </style>
</th:block>

<th:block layout:fragment="scripts">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script th:inline="javascript">
    const moments   = /*[[${momentMaps}]]*/ [];
    const eventLat  = /*[[${event.latitude}]]*/ null;
    const eventLng  = /*[[${event.longitude}]]*/ null;
    const eventName = /*[[${event.name}]]*/ '';

    // ── Map ───────────────────────────────────────────────────
    const mapEl = document.getElementById('eventMap');
    if (mapEl) {
      const map = L.map('eventMap', { zoomControl: true });

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
        maxZoom: 18
      }).addTo(map);

      const allMarkers = [];

      // ── Cluster group for moment pins ─────────────────────
      const clusterGroup = L.markerClusterGroup({
        maxClusterRadius: 40,
        iconCreateFunction: (cluster) => {
          const count = cluster.getChildCount();
          return L.divIcon({
            className: '',
            html: `<div style="
                            width:32px; height:32px;
                            background:#C1603A;
                            border:2px solid #fff;
                            border-radius:50%;
                            display:flex; align-items:center; justify-content:center;
                            color:#fff; font-size:0.75rem; font-weight:500;
                            box-shadow:0 2px 6px rgba(0,0,0,0.3);
                        ">${count}</div>`,
            iconSize: [32, 32],
            iconAnchor: [16, 16],
            popupAnchor: [0, -18]
          });
        }
      });

      // Track moment markers for zoom-based scaling
      const momentMarkers = [];

      function makeAccentIcon(size) {
        return L.divIcon({
          className: '',
          html: `<div style="
                        width:${size}px; height:${size}px;
                        background:#C1603A;
                        border:${Math.max(1, Math.round(size / 6))}px solid #fff;
                        border-radius:50%;
                        box-shadow:0 1px 4px rgba(0,0,0,0.3);
                    "></div>`,
          iconSize: [size, size],
          iconAnchor: [size / 2, size / 2],
          popupAnchor: [0, -(size / 2 + 2)]
        });
      }

      function getPinSize() {
        const zoom = map.getZoom();
        // 28px at zoom 10, scales down to 14px at zoom 16+
        return Math.max(14, Math.min(28, 42 - zoom));
      }

      function updateMarkerSizes() {
        const size = getPinSize();
        momentMarkers.forEach(marker => marker.setIcon(makeAccentIcon(size)));
      }

      map.on('zoomend', updateMarkerSizes);

      // Add moment pins to cluster group
      moments.forEach(moment => {
        if (!moment.latitude || !moment.longitude) return;

        const popup = `
                    <div class="map-pin-popup">
                        ${moment.imageUrl ? `<img src="${moment.imageUrl}" alt=""/>` : ''}
                        <div class="map-pin-popup-title">${moment.content || ''}</div>
                        <div class="map-pin-popup-sub">${moment.location ? moment.location.split(',')[0] : ''}</div>
                        <a class="map-pin-popup-link" href="#"
                           onclick="openModal(${moment.id}); return false;">
                           View moment &rarr;
                        </a>
                    </div>`;

        const marker = L.marker(
                [moment.latitude, moment.longitude],
                { icon: makeAccentIcon(getPinSize()) }
        ).bindPopup(popup);

        clusterGroup.addLayer(marker);
        momentMarkers.push(marker);
        allMarkers.push(marker);
      });

      map.addLayer(clusterGroup);

      // Fit map to moment markers only
      if (allMarkers.length > 1) {
        const group = L.featureGroup(allMarkers);
        map.fitBounds(group.getBounds().pad(0.3));
      } else if (allMarkers.length === 1) {
        map.setView(allMarkers[0].getLatLng(), 14);
      } else if (eventLat && eventLng) {
        map.setView([eventLat, eventLng], 13);
      } else {
        map.setView([51.5, -0.1], 10);
      }
    }

    // ── Modal ─────────────────────────────────────────────────
    const modal           = document.getElementById('momentModal');
    const modalClose      = document.getElementById('modalClose');
    const modalImage      = document.getElementById('modalImage');
    const modalNote       = document.getElementById('modalNote');
    const modalNoteText   = document.getElementById('modalNoteText');
    const modalContent    = document.getElementById('modalContent');
    const modalAuthor     = document.getElementById('modalAuthor');
    const modalDate       = document.getElementById('modalDate');
    const modalLocation   = document.getElementById('modalLocation');
    const modalLocationText = document.getElementById('modalLocationText');

    const momentLookup = {};
    moments.forEach(m => momentLookup[m.id] = m);

    function openModal(id) {
      const m = momentLookup[id];
      if (!m) return;

      if (m.imageUrl) {
        modalImage.src = m.imageUrl;
        modalImage.style.display = 'block';
        modalNote.style.display = 'none';
      } else {
        modalNote.style.display = 'flex';
        modalNoteText.textContent = m.content || '';
        modalImage.style.display = 'none';
      }

      modalContent.textContent = m.content || '';
      modalContent.style.display = (m.content && m.imageUrl) ? 'block' : 'none';
      modalAuthor.textContent = m.author || '';
      modalDate.textContent = m.date || '';

      if (m.location) {
        modalLocationText.textContent = m.location.split(',')[0];
        modalLocation.style.display = 'block';
      } else {
        modalLocation.style.display = 'none';
      }

      modal.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      modal.style.display = 'none';
      document.body.style.overflow = '';
    }

    modalClose.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

    // Attach click to moment cards
    document.querySelectorAll('.moment-card').forEach(card => {
      card.addEventListener('click', () => openModal(parseInt(card.dataset.momentId)));
    });
  </script>
</th:block>

</body>
</html>
