<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">
<head>
    <title>New Group</title>
</head>
<body>

<div layout:fragment="content">

    <!-- Page header -->
    <div class="mb-4">
        <a th:href="@{/groups}" class="text-muted small text-decoration-none">
            <i class="bi bi-arrow-left me-1"></i> Back to groups
        </a>
        <h1 class="memoir-page-title mt-2">Create a group</h1>
        <p class="memoir-page-subtitle">Groups let you share moments with friends and family</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="memoir-card">

                <form th:action="@{/groups}" method="post" id="createGroupForm">

                    <!-- Group name -->
                    <div class="mb-3">
                        <label for="name" class="form-label fw-500 small">Group name</label>
                        <input type="text"
                               class="form-control"
                               id="name"
                               name="name"
                               placeholder="e.g. The Smith Family"
                               required/>
                    </div>

                    <!-- Description -->
                    <div class="mb-3">
                        <label for="description" class="form-label fw-500 small">
                            Description
                            <span class="text-muted">(optional)</span>
                        </label>
                        <textarea class="form-control"
                                  id="description"
                                  name="description"
                                  rows="3"
                                  placeholder="What's this group about?"></textarea>
                    </div>

                    <!-- Group type -->
                    <div class="mb-4">
                        <label class="form-label fw-500 small">Group type</label>
                        <div class="d-flex gap-3">

                            <!-- Weekly option -->
                            <label class="flex-grow-1" style="cursor: pointer;">
                                <input type="radio" name="type" value="weekly"
                                       class="d-none" checked id="typeWeekly"/>
                                <div class="memoir-card text-center py-3"
                                     id="weeklyCard"
                                     style="border: 2px solid var(--memoir-accent);">
                                    <i class="bi bi-newspaper fs-4 d-block mb-2"
                                       style="color: var(--memoir-accent)"></i>
                                    <span class="fw-500 small">Weekly newsletter</span>
                                    <p class="text-muted mb-0" style="font-size: 0.75rem;">
                                        Share a weekly digest with your group
                                    </p>
                                </div>
                            </label>

                            <!-- Event option -->
                            <label class="flex-grow-1" style="cursor: pointer;">
                                <input type="radio" name="type" value="event"
                                       class="d-none" id="typeEvent"/>
                                <div class="memoir-card text-center py-3"
                                     id="eventCard">
                                    <i class="bi bi-calendar-event fs-4 d-block mb-2"
                                       style="color: var(--memoir-muted)"></i>
                                    <span class="fw-500 small">Event</span>
                                    <p class="text-muted mb-0" style="font-size: 0.75rem;">
                                        Collect moments from a specific event
                                    </p>
                                </div>
                            </label>

                        </div>
                    </div>

                    <!-- Weekly send date (shown for weekly groups only) -->
                    <div class="mb-4" id="weeklyFields">
                        <label for="sendDate" class="form-label fw-500 small">First send date</label>
                        <input type="datetime-local"
                               class="form-control"
                               id="sendDate"
                               name="sendDate"/>
                        <div class="form-text">
                            Your group's digest will be sent every 7 days from this date
                        </div>
                    </div>

                    <!-- Event dates and location (shown for event groups only) -->
                    <div class="mb-4" id="eventFields" style="display: none;">

                        <!-- Date range -->
                        <div class="row mb-3">
                            <div class="col">
                                <label for="startDate" class="form-label fw-500 small">Start date</label>
                                <input type="datetime-local" class="form-control"
                                       id="startDate" name="startDate"/>
                            </div>
                            <div class="col">
                                <label for="endDate" class="form-label fw-500 small">End date</label>
                                <input type="datetime-local" class="form-control"
                                       id="endDate" name="endDate"/>
                            </div>
                        </div>

                        <!-- Location search -->
                        <div class="mb-3">
                            <label for="locationSearch" class="form-label fw-500 small">
                                Location <span class="text-danger">*</span>
                            </label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="locationSearch"
                                       placeholder="Search for a location…" autocomplete="off"/>
                                <button class="btn btn-outline-secondary" type="button" id="locateBtn">
                                    <i class="bi bi-search"></i>
                                </button>
                            </div>

                            <!-- Inline error -->
                            <div id="locationError" class="text-danger small mt-1" style="display:none;">
                                <i class="bi bi-exclamation-circle me-1"></i>Please select a location for your event
                            </div>

                            <div id="locationResults" class="list-group mt-1" style="display:none;"></div>

                            <!-- Hidden fields submitted with form -->
                            <input type="hidden" id="location"  name="location"/>
                            <input type="hidden" id="latitude"  name="latitude"/>
                            <input type="hidden" id="longitude" name="longitude"/>

                            <!-- Selected location display -->
                            <div id="locationSelected" class="mt-2" style="display:none;">
                                <span class="badge rounded-pill"
                                      style="background:#f8fdf9; border:1px solid #c3e6cb;
                                             color:#2d6a4f; font-weight:400; font-size:0.8rem; padding: 6px 10px;">
                                    <i class="bi bi-geo-alt-fill me-1"></i>
                                    <span id="locationSelectedLabel"></span>
                                    <button type="button" class="btn-close btn-close-sm ms-1"
                                            id="clearLocation" style="font-size:0.6rem;"></button>
                                </span>
                            </div>

                            <!-- Mini preview map -->
                            <div id="locationMapPreview" class="mt-3 overflow-hidden"
                                 style="height:200px; border-radius:8px; display:none;"></div>
                        </div>

                    </div>

                    <!-- Submit -->
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-memoir flex-grow-1">
                            Create group
                        </button>
                        <a th:href="@{/groups}" class="btn btn-outline-secondary">
                            Cancel
                        </a>
                    </div>

                </form>
            </div>
        </div>
    </div>

</div>

<th:block layout:fragment="styles">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</th:block>

<th:block layout:fragment="scripts">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ── Type card toggle ──────────────────────────────────────
        const weekly       = document.getElementById('typeWeekly');
        const eventRadio   = document.getElementById('typeEvent');
        const weeklyCard   = document.getElementById('weeklyCard');
        const eventCard    = document.getElementById('eventCard');
        const weeklyFields = document.getElementById('weeklyFields');
        const eventFields  = document.getElementById('eventFields');

        function updateCards() {
            const isWeekly = weekly.checked;
            weeklyFields.style.display = isWeekly ? 'block' : 'none';
            eventFields.style.display  = isWeekly ? 'none'  : 'block';
            if (isWeekly) {
                weeklyCard.style.border = '2px solid var(--memoir-accent)';
                weeklyCard.querySelector('i').style.color = 'var(--memoir-accent)';
                eventCard.style.border  = '1px solid var(--memoir-border)';
                eventCard.querySelector('i').style.color = 'var(--memoir-muted)';
            } else {
                eventCard.style.border  = '2px solid var(--memoir-accent)';
                eventCard.querySelector('i').style.color = 'var(--memoir-accent)';
                weeklyCard.style.border = '1px solid var(--memoir-border)';
                weeklyCard.querySelector('i').style.color = 'var(--memoir-muted)';
            }
        }

        weekly.addEventListener('change', updateCards);
        eventRadio.addEventListener('change', updateCards);

        // ── Frontend validation ───────────────────────────────────
        document.getElementById('createGroupForm').addEventListener('submit', (e) => {
            if (eventRadio.checked && !document.getElementById('latitude').value) {
                e.preventDefault();
                document.getElementById('locationError').style.display = 'block';
                document.getElementById('locationSearch').focus();
            }
        });

        // ── Location search ───────────────────────────────────────
        let previewMap    = null;
        let previewMarker = null;
        let debounce      = null;

        const locationSearch  = document.getElementById('locationSearch');
        const locationResults = document.getElementById('locationResults');
        const locationField   = document.getElementById('location');
        const latField        = document.getElementById('latitude');
        const lngField        = document.getElementById('longitude');
        const selectedBox     = document.getElementById('locationSelected');
        const selectedLabel   = document.getElementById('locationSelectedLabel');
        const clearBtn        = document.getElementById('clearLocation');
        const locateBtn       = document.getElementById('locateBtn');
        const mapPreview      = document.getElementById('locationMapPreview');

        async function searchLocation(query) {
            if (!query.trim()) { locationResults.style.display = 'none'; return; }
            try {
                const res = await fetch(
                    `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=5`,
                    { headers: { 'Accept-Language': 'en' } }
                );
                renderResults(await res.json());
            } catch (e) {
                console.warn('Geocoding failed:', e);
            }
        }

        function renderResults(results) {
            if (!results.length) {
                locationResults.innerHTML = '<div class="list-group-item text-muted small">No results found</div>';
                locationResults.style.display = 'block';
                return;
            }
            locationResults.innerHTML = results.map(r => `
                <button type="button" class="list-group-item list-group-item-action small"
                        data-lat="${r.lat}" data-lng="${r.lon}" data-name="${r.display_name}">
                    <i class="bi bi-geo-alt me-2 text-muted"></i>${r.display_name}
                </button>
            `).join('');
            locationResults.style.display = 'block';
            locationResults.querySelectorAll('button').forEach(btn => {
                btn.addEventListener('click', () => selectLocation(
                    btn.dataset.name,
                    parseFloat(btn.dataset.lat),
                    parseFloat(btn.dataset.lng)
                ));
            });
        }

        function selectLocation(name, lat, lng) {
            locationField.value = name;
            latField.value      = lat;
            lngField.value      = lng;
            document.getElementById('locationError').style.display = 'none';
            selectedLabel.textContent = name.split(',').slice(0, 3).join(',');
            selectedBox.style.display = 'block';
            locationResults.style.display = 'none';
            locationSearch.value = '';
            mapPreview.style.display = 'block';
            if (!previewMap) {
                previewMap = L.map('locationMapPreview', {
                    zoomControl: false, dragging: false, scrollWheelZoom: false
                });
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(previewMap);
            }
            previewMap.setView([lat, lng], 13);
            if (previewMarker) previewMarker.remove();
            previewMarker = L.circleMarker([lat, lng], {
                radius: 8, color: '#C1603A', fillColor: '#C1603A', fillOpacity: 0.8
            }).addTo(previewMap);
            setTimeout(() => previewMap.invalidateSize(), 100);
        }

        clearBtn.addEventListener('click', () => {
            locationField.value = '';
            latField.value      = '';
            lngField.value      = '';
            selectedBox.style.display = 'none';
            mapPreview.style.display  = 'none';
        });

        locationSearch.addEventListener('input', () => {
            clearTimeout(debounce);
            debounce = setTimeout(() => searchLocation(locationSearch.value), 350);
        });

        locateBtn.addEventListener('click', () => searchLocation(locationSearch.value));

        document.addEventListener('click', (e) => {
            if (!locationSearch.contains(e.target) && !locationResults.contains(e.target)) {
                locationResults.style.display = 'none';
            }
        });
    </script>
</th:block>

</body>
</html>
