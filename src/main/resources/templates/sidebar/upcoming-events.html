<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<div th:fragment="upcoming-events(events)" class="card border-0 rounded-3 mb-3"
     style="border: 0.5px solid rgba(0,0,0,0.08) !important;">
    <div class="card-body p-3">

        <h6 class="mb-3" style="font-family:'Playfair Display',serif; font-weight:400; font-size:15px; color:#1a1a1a;">
            Upcoming events
        </h6>

        <p th:if="${events == null or events.isEmpty()}"
           class="text-muted small mb-0">No upcoming events.</p>

        <ul th:unless="${events == null or events.isEmpty()}"
            class="list-unstyled mb-0">
            <li th:each="event, iter : ${events}"
                th:classappend="${!iter.last} ? 'mb-3' : ''">

                <a th:href="@{/groups/{gid}/events/{id}(gid=${event.group.id}, id=${event.id})}"
                   class="d-flex align-items-start gap-2 text-decoration-none group-tile">

                    <div class="text-center flex-shrink-0" style="width:36px;">
                        <div class="lh-1 fw-500" style="font-size:18px; color:#C4522A;"
                             th:text="${#temporals.format(event.startDate, 'd')}">1</div>
                        <div class="text-uppercase text-muted lh-1 mt-1" style="font-size:10px; letter-spacing:0.04em;"
                             th:text="${#temporals.format(event.startDate, 'MMM')}">Jan</div>
                    </div>

                    <div>
                        <div class="fw-500" style="font-size:13px; color:#1a1a1a; line-height:1.3;"
                             th:text="${event.name}">Event name</div>
                        <div class="text-muted mt-1" style="font-size:11.5px;">
                            <span th:if="${event.location != null}" th:text="${event.location + ' · '}"></span>
                            <span th:text="${#temporals.format(event.startDate, 'HH:mm')}"></span>
                        </div>
                    </div>

                </a>
            </li>
        </ul>

        <div class="border-top mt-3 pt-2" style="border-color:rgba(0,0,0,0.07) !important;">
            <a th:href="@{/events}" class="text-decoration-none" style="color:#C4522A; font-size:12px;">
                View all events &rarr;
            </a>
        </div>

    </div>
</div>
</html>
