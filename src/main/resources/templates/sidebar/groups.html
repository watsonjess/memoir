<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<div th:fragment="groups(userGroups)" class="card border-0 rounded-3 mb-3"
          style="border: 0.5px solid rgba(0,0,0,0.08) !important;">
    <div class="card-body p-3">

        <h6 class="mb-3" style="font-family:'Playfair Display',serif; font-weight:400; font-size:15px; color:#1a1a1a;">
            Your groups
        </h6>

        <p th:if="${userGroups == null or userGroups.isEmpty()}"
           class="text-muted small mb-0">You haven't joined any groups yet.</p>

        <ul th:unless="${userGroups == null or userGroups.isEmpty()}"
            class="list-unstyled mb-0">
            <li th:each="userGroup, iter : ${userGroups}"
                th:if="${userGroup.status == 'joined'}"
                th:classappend="${!iter.last} ? 'mb-3' : ''"
                class="d-flex align-items-center gap-2">

                <a th:href="@{/groups/{id}(id=${userGroup.group.id})}"
                   class="d-flex align-items-center gap-2 text-decoration-none w-100 group-tile">

                    <div class="d-flex align-items-center justify-content-center rounded-2 flex-shrink-0 text-white fw-500"
                         style="width:32px; height:32px; font-size:13px; background:#C4522A;"
                         th:text="${#strings.toUpperCase(#strings.substring(userGroup.group.name, 0, 1))}">G</div>

                    <div class="min-w-0">
                        <div class="fw-500" style="font-size:13px; color:#1a1a1a;"
                             th:text="${userGroup.group.name}">Group name</div>
                        <div class="text-muted text-capitalize" style="font-size:11px;"
                             th:text="${userGroup.role}">member</div>
                    </div>

                </a>
            </li>
        </ul>

        <div class="border-top mt-3 pt-2" style="border-color:rgba(0,0,0,0.07) !important;">
            <a th:href="@{/groups}" class="text-decoration-none" style="color:#C4522A; font-size:12px;">
                Browse all groups &rarr;
            </a>
        </div>

    </div>
</div>
</html>
