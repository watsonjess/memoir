<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<div th:fragment="reminder(groupsMissingToday)"
     class="card border-0 rounded-3 mb-3"
     style="border: 0.5px solid rgba(0,0,0,0.08) !important;">
  <div class="card-body p-3">

    <div class="d-flex align-items-center gap-2 mb-2">
      <i class="bi bi-sun" style="color:#C4522A; font-size:15px;"></i>
      <h6 class="mb-0" style="font-family:'Playfair Display',serif; font-weight:400; font-size:15px; color:#1a1a1a;">
        Today's moments
      </h6>
    </div>

    <div th:if="${groupsMissingToday == null or groupsMissingToday.isEmpty()}">
      <p class="text-muted mb-0" style="font-size:13px; line-height:1.5;">
        You've posted to all your groups today. Great work!
      </p>
    </div>

    <div th:unless="${groupsMissingToday == null or groupsMissingToday.isEmpty()}">
      <p class="text-muted mb-2" style="font-size:13px; line-height:1.5;">
        You haven't posted to
        <strong th:if="${groupsMissingToday.size() == 1}"
                th:text="${groupsMissingToday[0].name}"
                style="color:#1a1a1a;">a group</strong>
        <span th:if="${groupsMissingToday.size() > 1}">
                    <strong style="color:#C4522A;" th:text="${groupsMissingToday.size()}">2</strong>
                    <span style="color:#1a1a1a;"> groups</span>
                </span>
        today.
      </p>

      <ul th:if="${groupsMissingToday.size() > 1}"
          class="list-unstyled mb-2" style="font-size:12.5px;">
        <li th:each="group : ${groupsMissingToday}" class="mb-1">
          <a th:href="@{/groups/{id}(id=${group.id})}"
             class="text-decoration-none"
             style="color:#C4522A;"
             th:text="${group.name}">Group name</a>
        </li>
      </ul>

      <a th:href="@{/moments/new}" class="btn btn-sm w-100 mt-1"
         style="background:#C4522A; color:#fff; font-size:12.5px; border-radius:20px;">
        + Add a moment
      </a>
    </div>

  </div>
</div>

</html>
