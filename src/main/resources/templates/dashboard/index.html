<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" >

<th:block th:fragment="styles">
    <style>
        .moments-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin-top: 32px;
        }
        .moment-tile {
            border-radius: 12px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s, box-shadow 0.2s;
            display: block;
        }
        .moment-tile:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }
        .moment-tile-image {
            width: 100%;
            aspect-ratio: 3 / 2;
            object-fit: cover;
            object-position: center;
            display: block;
            background-color: #f8f9fa; /* Placeholder color while loading */
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .moment-tile-body {
            padding: 16px;
        }
        .moment-tile-date {
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 6px;
        }
        .moment-tile-content {
            font-size: 0.95rem;
            color: #333;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .moment-tile-location {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 8px;
        }
        .moments-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 32px;
        }
        .moments-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
        }
        .empty-state {
            text-align: center;
            padding: 80px 0;
            color: #aaa;
        }
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 16px;
        }
        .show-all {
            font-size: 13px;
            color: #C4522A;
            text-decoration: none;
        }

        .welcome {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            margin-top: 0;
            margin-bottom: 0;
            line-height: 1.2;
        }

        .group-tile {
            border-radius: 8px;
            padding: 6px 8px;
            margin: -6px -8px;
            transition: background 0.15s ease;
        }

        .group-tile:hover {
            background: #F5F0E8;
        }
    </style>
</th:block>
<th:block th:fragment="dashboard">
    <div class="row g-4">


    <div class="col-12 col-lg-8">
        <h1 class="welcome" th:text="'Hello, ' + ${firstName} + '!'">Hello!</h1>

    <div class="d-flex justify-content-between align-items-baseline mt-4 mb-2">
        <h2>Recent memories</h2>
        <a th:href="@{/moments}" class="show-all">
            View all &rarr;
        </a>
    </div>
    <div th:if="${moments.isEmpty()}" class="empty-state">
        <i class="bi bi-camera"></i>
        <p>No moments yet. Start capturing your day!</p>
        <a th:href="@{/moments/new}" class="btn btn-memoir">Add your first moment</a>
    </div>

    <div th:unless="${moments.isEmpty()}" class="moments-grid">
        <a th:each="moment : ${moments}"
           th:href="@{/moments/{id}(id=${moment.id})}"
           class="moment-tile">
            <img th:src="${#strings.replace(moment.imageUrl, '/upload/', '/upload/c_fill,g_auto,w_600,h_400/')}"
                 th:alt="${moment.content}"
                 class="moment-tile-image"/>
            <div class="moment-tile-body">
                <p class="moment-tile-date"
                   th:text="${#temporals.format(moment.createdAt, 'dd MMMM yyyy')}"></p>
                <p class="moment-tile-content" th:text="${moment.content}"></p>
                <p class="moment-tile-location"
                   th:if="${moment.location != null}">
                    <i class="bi bi-geo-alt"></i>
                    <span th:text="${moment.location}"></span>
                </p>
            </div>
        </a>
    </div>
    </div>
        <div class="col-12 col-lg-4 mt-4">
            <div th:replace="~{sidebar/upcoming-events :: upcoming-events(${events})}"></div>
            <div th:replace="~{sidebar/groups :: groups(${userGroups})}"></div>
            <div th:replace="~{sidebar/newsletters :: newsletters(${newsletters})}"></div>
        </div>
    </div>
</th:block>
</html>
