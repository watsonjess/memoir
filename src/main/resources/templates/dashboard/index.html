<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<th:block th:fragment="styles">
    <style>
        .dashboard-container {
            height: calc(100vh - 100px);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .moments-grid-container {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 10px;
        }

        .moments-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin-top: 32px;
            align-items: start;
        }

        .moment-tile {
            display: flex;
            flex-direction: column;
            height: 100%;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            text-decoration: none !important;
            transition: transform 0.2s;
        }

        .moment-tile-body {
            padding: 16px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .moment-tile:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        }

        .moment-tile-image {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            background-color: #f8f9fa;
        }

        .moment-tile-date {
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 6px;
        }

        .moment-tile-content {
            font-size: 14px;
            color: #1a1a1a;
            margin-bottom: 8px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 3em;
        }

        .moment-tile-location {
            font-size: 12px;
            color: #C4522A;
            margin-top: auto;
            min-height: 18px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .moments-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 32px;
        }

        .moments-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
        }

        .empty-state {
            text-align: center;
            padding: 80px 0;
            color: #aaa;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 16px;
        }

        .show-all {
            font-size: 13px;
            color: #C4522A;
            text-decoration: none;
        }

        .welcome {
            font-family: 'Playfair Display', serif;
            font-weight: 400;
            margin-top: 0;
            margin-bottom: 0;
            line-height: 1.2;
        }

        .group-tile {
            border-radius: 8px;
            padding: 6px 8px;
            margin: -6px -8px;
            transition: background 0.15s ease;
        }

        .group-tile:hover {
            background: #F5F0E8;
        }

        .pagination-container {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        .pagination-left {
            text-align: left;
        }

        .pagination-center {
            text-align: center;
            min-width: 100px;
        }

        .pagination-right {
            text-align: right;
        }
    </style>
</th:block>
<th:block th:fragment="dashboard">
    <div class="row g-4 align-items-start dashboard-container">


        <div class="col-12 col-lg-8">
            <h1 class="welcome" th:text="'Hello, ' + ${firstName} + '!'">Hello!</h1>

            <div class="d-flex justify-content-between align-items-baseline mt-4 mb-2">
                <h2>Recent moments</h2>
                <a th:href="@{/moments}" class="show-all">
                    View all &rarr;
                </a>
            </div>
            <div th:if="${moments.isEmpty()}" class="empty-state">
                <i class="bi bi-camera"></i>
                <p>No moments yet. Start capturing your day!</p>
                <a th:href="@{/moments/new}" class="btn btn-memoir">Add your first moment</a>
            </div>

            <div class="moments-grid-container">
                <div th:unless="${moments.isEmpty()}" class="moments-grid">
                    <a th:each="moment : ${moments}"
                       th:href="@{/moments/{id}(id=${moment.id})}"
                       class="moment-tile">
                        <img th:src="${#strings.replace(moment.imageUrl, '/upload/', '/upload/c_fill,g_auto,w_600,h_400/')}"
                             th:alt="${moment.content}"
                             class="moment-tile-image"/>
                        <div class="moment-tile-body">
                            <p class="moment-tile-date"
                               th:text="${#temporals.format(moment.createdAt, 'dd MMMM yyyy')}"></p>
                            <p class="moment-tile-content" th:text="${moment.content}"></p>
                            <div class="moment-tile-location">
                                <th:block th:if="${moment.location != null and !moment.location.isEmpty()}">
                                    <i class="bi bi-geo-alt"></i>
                                    <span th:text="${moment.location.split(',')[0]}">London, UK</span>
                                </th:block>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
            <div th:if="${totalPages > 1}" class="pagination-container">

                <div class="pagination-left">
                    <a th:if="${hasPrev}"
                       th:href="@{/(page=${currentPage - 1})}"
                       class="text-decoration-none"
                       style="font-size:13px; color:#C4522A;">&larr; Newer</a>
                </div>

                <div class="pagination-center">
        <span class="text-muted" style="font-size:12px;"
              th:text="${currentPage + 1} + ' of ' + ${totalPages}">1 of 2</span>
                </div>

                <div class="pagination-right">
                    <a th:if="${hasNext}"
                       th:href="@{/(page=${currentPage + 1})}"
                       class="text-decoration-none"
                       style="font-size:13px; color:#C4522A;">Older &rarr;</a>
                </div>

            </div>
        </div>
        <div class="col-12 col-lg-4 mt-4 mt-lg-5">
            <div th:replace="~{sidebar/reminder :: reminder(${groupsMissingToday})}"></div>
            <div th:replace="~{sidebar/upcoming-events :: upcoming-events(${events})}"></div>
            <div th:replace="~{sidebar/groups :: groups(${userGroups})}"></div>
            <div th:replace="~{sidebar/newsletters :: newsletters(${newsletters})}"></div>
        </div>
    </div>
</th:block>
</html>
