<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <th:block layout:fragment="styles">
        <style>
            .nl-header {
                display: flex;
                align-items: flex-end;
                justify-content: space-between;
                margin-bottom: 2rem;
                flex-wrap: wrap;
                gap: 1rem;
            }
            .nl-kicker {
                font-size: 0.7rem;
                font-weight: 500;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                color: var(--memoir-accent);
                margin-bottom: 0.35rem;
            }
            .nl-month-nav {
                display: flex;
                align-items: center;
                gap: 0.5rem;
            }
            .nl-month-btn {
                width: 34px;
                height: 34px;
                border-radius: 50%;
                border: 1px solid var(--memoir-border);
                background: var(--memoir-surface);
                color: var(--memoir-muted);
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                transition: all 0.15s;
                font-size: 0.9rem;
                padding: 0;
                line-height: 1;
            }
            .nl-month-btn:hover {
                border-color: var(--memoir-accent);
                color: var(--memoir-accent);
                background: #FAECE7;
            }
            .nl-month-label {
                font-family: 'Playfair Display', serif;
                font-size: 1.1rem;
                font-weight: 600;
                min-width: 160px;
                text-align: center;
                letter-spacing: -0.01em;
            }
            .nl-calendar-wrap {
                background: var(--memoir-surface);
                border: 1px solid var(--memoir-border);
                border-radius: 16px;
                overflow: hidden;
            }
            .nl-dow-row {
                display: grid;
                grid-template-columns: repeat(7, 1fr);
                border-bottom: 1px solid var(--memoir-border);
                background: var(--memoir-cream);
            }
            .nl-dow-cell {
                padding: 0.7rem 0;
                text-align: center;
                font-size: 0.7rem;
                font-weight: 500;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: var(--memoir-muted);
            }
            .nl-date-grid {
                display: grid;
                grid-template-columns: repeat(7, 1fr);
            }
            .nl-day {
                min-height: 100px;
                border-right: 1px solid var(--memoir-border);
                border-bottom: 1px solid var(--memoir-border);
                padding: 0.6rem 0.7rem 0.5rem;
                position: relative;
                cursor: default;
                transition: background 0.12s;
            }
            .nl-day:nth-child(7n) { border-right: none; }
            .nl-day--empty {
                background: var(--memoir-cream);
                opacity: 0.45;
            }
            .nl-day--clickable { cursor: pointer; }
            .nl-day--clickable:hover { background: #FBF3F0; }
            .nl-day--today .nl-day-num {
                background: var(--memoir-accent);
                color: #fff;
            }
            .nl-day--selected { background: #FAECE7; }
            .nl-day--selected .nl-day-num {
                background: var(--memoir-accent);
                color: #fff;
            }
            .nl-day-num {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 28px;
                height: 28px;
                border-radius: 50%;
                font-size: 0.82rem;
                font-weight: 500;
                color: var(--memoir-ink);
                margin-bottom: 0.35rem;
                transition: background 0.12s, color 0.12s;
            }
            .nl-day--empty .nl-day-num { color: var(--memoir-muted); }
            .nl-event-pill {
                display: block;
                font-size: 0.68rem;
                font-weight: 500;
                padding: 2px 7px;
                border-radius: 20px;
                background: var(--memoir-accent);
                color: #fff;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                margin-bottom: 3px;
                line-height: 1.5;
                max-width: 100%;
                text-decoration: none;
                cursor: pointer;
            }
            .nl-event-pill:hover { opacity: 0.85; color: #fff; }
            .nl-event-pill--light {
                background: #FAECE7;
                color: #712B13;
            }
            .nl-event-pill--more {
                background: transparent;
                color: var(--memoir-muted);
                font-size: 0.65rem;
                padding-left: 4px;
            }
            @media (max-width: 991px) {
                .nl-day { min-height: 64px; }
                .nl-event-pill { display: none; }
                .nl-day--has-events::after {
                    content: '';
                    display: block;
                    width: 5px;
                    height: 5px;
                    border-radius: 50%;
                    background: var(--memoir-accent);
                    margin: 4px auto 0;
                }
            }
            @media (max-width: 575px) {
                .nl-day { min-height: 48px; padding: 0.35rem; }
                .nl-day-num { width: 24px; height: 24px; font-size: 0.75rem; }
            }
        </style>
    </th:block>
</head>

<body>
<div layout:fragment="content">

    <div class="nl-header">
        <div>
            <p class="nl-kicker">Archive</p>
            <h1 class="memoir-page-title">Newsletters</h1>
            <p class="memoir-page-subtitle">See all your newsletters.</p>
        </div>
        <div class="nl-month-nav">
            <button class="nl-month-btn" id="nlPrevMonth" aria-label="Previous month">
                <i class="bi bi-chevron-left"></i>
            </button>
            <span class="nl-month-label" id="nlMonthLabel"></span>
            <button class="nl-month-btn" id="nlNextMonth" aria-label="Next month">
                <i class="bi bi-chevron-right"></i>
            </button>
        </div>
    </div>

    <div class="nl-calendar-wrap">
        <div class="nl-dow-row">
            <div class="nl-dow-cell">Mon</div>
            <div class="nl-dow-cell">Tue</div>
            <div class="nl-dow-cell">Wed</div>
            <div class="nl-dow-cell">Thu</div>
            <div class="nl-dow-cell">Fri</div>
            <div class="nl-dow-cell">Sat</div>
            <div class="nl-dow-cell">Sun</div>
        </div>
        <div class="nl-date-grid" id="nlDateGrid"></div>
    </div>

</div>

<th:block layout:fragment="scripts">
    <script th:inline="javascript">
        (() => {
            // Populate data from backend
            const data = {};
            /*[# th:each="nl : ${newsletters}"]*/
            /*[# th:if="${nl.sentAt != null and nl.pdfUrl != null}"]*/
            (function() {
                const key = /*[[${nl.sentAt.year}]]*/ 0
                    + '-' + /*[[${nl.sentAt.monthValue}]]*/ 0
                    + '-' + /*[[${nl.sentAt.dayOfMonth}]]*/ 0;
                if (!data[key]) data[key] = [];
                data[key].push({
                    title: /*[[${nl.group.name}]]*/ '',
                    url: /*[[${nl.pdfUrl}]]*/ ''
                });
            })();
            /*[/]*/
            /*[/]*/

            const MONTHS = [
                "January", "February", "March", "April", "May", "June",
                "July", "August", "September", "October", "November", "December"
            ];

            const today = new Date();
            let year = today.getFullYear();
            let month = today.getMonth();
            let selectedDay = null;

            const grid = document.getElementById("nlDateGrid");
            const monthLabel = document.getElementById("nlMonthLabel");

            document.getElementById("nlPrevMonth").addEventListener("click", () => navigate(-1));
            document.getElementById("nlNextMonth").addEventListener("click", () => navigate(+1));

            function navigate(dir) {
                month += dir;
                if (month > 11) { month = 0; year++; }
                if (month < 0) { month = 11; year--; }
                render();
            }

            function render() {
                monthLabel.textContent = `${MONTHS[month]} ${year}`;
                grid.innerHTML = "";

                let startOffset = (new Date(year, month, 1).getDay() + 6) % 7;
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const totalCells = Math.ceil((startOffset + daysInMonth) / 7) * 7;

                for (let i = 0; i < totalCells; i++) {
                    const dayNum = i - startOffset + 1;
                    grid.appendChild(dayNum < 1 || dayNum > daysInMonth
                        ? buildEmptyCell(dayNum, daysInMonth)
                        : buildDayCell(dayNum)
                    );
                }

                const cells = grid.querySelectorAll(".nl-day");
                cells.forEach((cell, idx) => {
                    if (idx >= cells.length - 7) cell.style.borderBottom = "none";
                });
            }

            function buildEmptyCell(dayNum, daysInMonth) {
                const cell = document.createElement("div");
                cell.className = "nl-day nl-day--empty";
                const num = document.createElement("span");
                num.className = "nl-day-num";
                num.textContent = dayNum < 1
                    ? new Date(year, month, 0).getDate() + dayNum
                    : dayNum - daysInMonth;
                cell.appendChild(num);
                return cell;
            }

            function buildDayCell(dayNum) {
                const key = `${year}-${month + 1}-${dayNum}`;
                const events = data[key] ?? [];

                const isToday = dayNum === today.getDate()
                    && month === today.getMonth()
                    && year === today.getFullYear();

                const isSelected = selectedDay?.year === year
                    && selectedDay?.month === month
                    && selectedDay?.day === dayNum;

                const cell = document.createElement("div");
                cell.className = [
                    "nl-day nl-day--clickable",
                    isToday ? "nl-day--today" : "",
                    isSelected ? "nl-day--selected" : "",
                    events.length ? "nl-day--has-events" : "",
                ].filter(Boolean).join(" ");

                const num = document.createElement("span");
                num.className = "nl-day-num";
                num.textContent = dayNum;
                cell.appendChild(num);


                events.slice(0, 2).forEach((ev, idx) => {
                    const pill = document.createElement("a");
                    pill.className = `nl-event-pill${idx === 1 ? " nl-event-pill--light" : ""}`;
                    pill.textContent = ev.title;
                    pill.href = ev.url;
                    pill.target = "_blank";
                    cell.appendChild(pill);
                });

                if (events.length > 2) {
                    const more = document.createElement("span");
                    more.className = "nl-event-pill nl-event-pill--more";
                    more.textContent = `+${events.length - 2} more`;
                    cell.appendChild(more);
                }

                cell.addEventListener("click", () => {
                    selectedDay = {year, month, day: dayNum};
                    render();
                });

                return cell;
            }

            render();
        })();
    </script>
</th:block>

</body>
</html>
