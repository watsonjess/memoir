<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <th:block layout:fragment="styles">
        <style>
            .nl-header {
                display: flex;
                align-items: flex-end;
                justify-content: space-between;
                margin-bottom: 2rem;
                flex-wrap: wrap;
                gap: 1rem;
            }
            .nl-kicker {
                font-size: 0.7rem;
                font-weight: 500;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                color: var(--memoir-accent);
                margin-bottom: 0.35rem;
            }
            .nl-month-nav {
                display: flex;
                align-items: center;
                gap: 0.5rem;
            }
            .nl-month-btn {
                width: 34px;
                height: 34px;
                border-radius: 50%;
                border: 1px solid var(--memoir-border);
                background: var(--memoir-surface);
                color: var(--memoir-muted);
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                transition: all 0.15s;
                font-size: 0.9rem;
                padding: 0;
                line-height: 1;
            }
            .nl-month-btn:hover {
                border-color: var(--memoir-accent);
                color: var(--memoir-accent);
                background: #FAECE7;
            }
            .nl-month-label {
                font-family: 'Playfair Display', serif;
                font-size: 1.1rem;
                font-weight: 600;
                min-width: 160px;
                text-align: center;
                letter-spacing: -0.01em;
            }
            .nl-calendar-wrap {
                background: var(--memoir-surface);
                border: 1px solid var(--memoir-border);
                border-radius: 16px;
                overflow: hidden;
            }
            .nl-dow-row {
                display: grid;
                grid-template-columns: repeat(7, 1fr);
                border-bottom: 1px solid var(--memoir-border);
                background: var(--memoir-cream);
            }
            .nl-dow-cell {
                padding: 0.7rem 0;
                text-align: center;
                font-size: 0.7rem;
                font-weight: 500;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                color: var(--memoir-muted);
            }
            .nl-date-grid {
                display: grid;
                grid-template-columns: repeat(7, 1fr);
            }
            .nl-day {
                min-height: 100px;
                border-right: 1px solid var(--memoir-border);
                border-bottom: 1px solid var(--memoir-border);
                padding: 0.6rem 0.7rem 0.5rem;
                position: relative;
                cursor: default;
                transition: background 0.12s;
            }
            .nl-day:nth-child(7n) { border-right: none; }
            .nl-day--empty {
                background: var(--memoir-cream);
                opacity: 0.45;
            }
            .nl-day--clickable { cursor: pointer; }
            .nl-day--clickable:hover { background: #FBF3F0; }
            .nl-day--today .nl-day-num {
                background: var(--memoir-accent);
                color: #fff;
            }
            .nl-day--selected { background: #FAECE7; }
            .nl-day--selected .nl-day-num {
                background: var(--memoir-accent);
                color: #fff;
            }
            .nl-day-num {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 28px;
                height: 28px;
                border-radius: 50%;
                font-size: 0.82rem;
                font-weight: 500;
                color: var(--memoir-ink);
                margin-bottom: 0.35rem;
                transition: background 0.12s, color 0.12s;
            }
            .nl-day--empty .nl-day-num { color: var(--memoir-muted); }
            .nl-event-pill {
                display: block;
                font-size: 0.68rem;
                font-weight: 500;
                padding: 2px 7px;
                border-radius: 20px;
                background: var(--memoir-accent);
                color: #fff;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                margin-bottom: 3px;
                line-height: 1.5;
                max-width: 100%;
            }
            .nl-event-pill--light {
                background: #FAECE7;
                color: #712B13;
            }
            .nl-event-pill--more {
                background: transparent;
                color: var(--memoir-muted);
                font-size: 0.65rem;
                padding-left: 4px;
            }
            .nl-panel-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.3);
                z-index: 100;
            }
            .nl-panel-overlay.active { display: block; }
            .nl-panel {
                position: fixed;
                top: 0;
                right: -420px;
                width: 400px;
                max-width: 95vw;
                height: 100vh;
                background: #fff;
                box-shadow: -4px 0 24px rgba(0,0,0,0.12);
                z-index: 101;
                transition: right 0.3s ease;
                display: flex;
                flex-direction: column;
                padding: 32px 28px;
                overflow-y: auto;
            }
            .nl-panel.active { right: 0; }
            .nl-panel-close {
                position: absolute;
                top: 16px;
                right: 16px;
                background: none;
                border: none;
                font-size: 1.4rem;
                cursor: pointer;
                color: var(--memoir-muted);
                line-height: 1;
            }
            .nl-panel-close:hover { color: var(--memoir-ink); }
            .nl-panel-date {
                font-family: 'Playfair Display', serif;
                font-size: 1.4rem;
                font-weight: 600;
                margin-bottom: 4px;
            }
            .nl-panel-kicker {
                font-size: 0.7rem;
                text-transform: uppercase;
                letter-spacing: 0.1em;
                color: var(--memoir-muted);
                margin-bottom: 24px;
            }
            .nl-panel-item {
                border: 1px solid var(--memoir-border);
                border-radius: 12px;
                padding: 16px 18px;
                margin-bottom: 12px;
            }
            .nl-panel-group-name {
                font-weight: 600;
                font-size: 0.95rem;
                margin-bottom: 10px;
            }
            .nl-panel-links {
                display: flex;
                gap: 8px;
            }
            .nl-panel-link {
                flex: 1;
                text-align: center;
                padding: 6px 0;
                border-radius: 8px;
                font-size: 0.8rem;
                font-weight: 500;
                text-decoration: none;
                transition: opacity 0.15s;
            }
            .nl-panel-link:hover { opacity: 0.8; }
            .nl-panel-link--html {
                background: var(--memoir-accent);
                color: #fff;
            }
            .nl-panel-link--pdf {
                background: #f0f0f0;
                color: var(--memoir-ink);
            }
            .nl-panel-empty {
                color: var(--memoir-muted);
                font-size: 0.9rem;
                margin-top: 8px;
            }
            .nl-current-btn {
                display: inline-block;
                margin-bottom: 20px;
                font-size: 0.8rem;
                color: var(--memoir-accent);
                text-decoration: none;
                font-weight: 500;
            }
            .nl-current-btn:hover { text-decoration: underline; }
            @media (max-width: 991px) {
                .nl-day { min-height: 64px; }
                .nl-event-pill { display: none; }
                .nl-day--has-events::after {
                    content: '';
                    display: block;
                    width: 5px;
                    height: 5px;
                    border-radius: 50%;
                    background: var(--memoir-accent);
                    margin: 4px auto 0;
                }
            }
            @media (max-width: 575px) {
                .nl-day { min-height: 48px; padding: 0.35rem; }
                .nl-day-num { width: 24px; height: 24px; font-size: 0.75rem; }
            }
            .nl-picker-overlay {
                display: none;
                position: fixed;
                inset: 0;
                z-index: 200;
            }
            .nl-picker-overlay.active { display: block; }

            .nl-picker {
                position: absolute;
                background: var(--memoir-surface);
                border: 1px solid var(--memoir-border);
                border-radius: 14px;
                box-shadow: 0 8px 32px rgba(0,0,0,0.12);
                padding: 20px;
                width: 280px;
                z-index: 201;
            }

            .nl-picker-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 16px;
            }

            .nl-picker-year {
                font-family: 'Playfair Display', serif;
                font-size: 1.1rem;
                font-weight: 600;
            }

            .nl-picker-year-btn {
                background: none;
                border: 1px solid var(--memoir-border);
                border-radius: 50%;
                width: 28px;
                height: 28px;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                color: var(--memoir-muted);
                font-size: 0.8rem;
                transition: all 0.15s;
            }

            .nl-picker-year-btn:hover {
                border-color: var(--memoir-accent);
                color: var(--memoir-accent);
            }

            .nl-picker-months {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 6px;
            }

            .nl-picker-month-btn {
                padding: 8px 4px;
                border: 1px solid var(--memoir-border);
                border-radius: 8px;
                background: var(--memoir-surface);
                font-size: 0.8rem;
                cursor: pointer;
                transition: all 0.15s;
                color: var(--memoir-ink);
                text-align: center;
            }

            .nl-picker-month-btn:hover {
                border-color: var(--memoir-accent);
                color: var(--memoir-accent);
                background: #FAECE7;
            }

            .nl-picker-month-btn.active {
                background: var(--memoir-accent);
                color: #fff;
                border-color: var(--memoir-accent);
            }
        </style>
    </th:block>
</head>

<body>
<div layout:fragment="content">

    <div class="nl-header">
        <div>
            <p class="nl-kicker">Archive</p>
            <h1 class="memoir-page-title">Newsletters</h1>
            <p class="memoir-page-subtitle">See all your newsletters.</p>
        </div>
        <div class="nl-month-nav">
            <button class="nl-month-btn" id="nlPrevMonth" aria-label="Previous month">
                <i class="bi bi-chevron-left"></i>
            </button>
            <span class="nl-month-label" id="nlMonthLabel"
                  style="cursor: pointer; user-select: none;"
                  title="Click to jump to a month">
            </span>
            <button class="nl-month-btn" id="nlNextMonth" aria-label="Next month">
                <i class="bi bi-chevron-right"></i>
            </button>
        </div>
    </div>

    <div class="nl-picker-overlay" id="nlPickerOverlay"></div>
    <div class="nl-picker" id="nlPicker" style="display:none;">
        <div class="nl-picker-header">
            <button class="nl-picker-year-btn" id="nlPickerPrevYear">
                <i class="bi bi-chevron-left"></i>
            </button>
            <span class="nl-picker-year" id="nlPickerYear"></span>
            <button class="nl-picker-year-btn" id="nlPickerNextYear">
                <i class="bi bi-chevron-right"></i>
            </button>
        </div>
        <div class="nl-picker-months" id="nlPickerMonths"></div>
    </div>

    <div class="nl-calendar-wrap">
        <div class="nl-dow-row">
            <div class="nl-dow-cell">Mon</div>
            <div class="nl-dow-cell">Tue</div>
            <div class="nl-dow-cell">Wed</div>
            <div class="nl-dow-cell">Thu</div>
            <div class="nl-dow-cell">Fri</div>
            <div class="nl-dow-cell">Sat</div>
            <div class="nl-dow-cell">Sun</div>
        </div>
        <div class="nl-date-grid" id="nlDateGrid"></div>
    </div>

    <div class="nl-panel-overlay" id="nlOverlay"></div>

    <div class="nl-panel" id="nlPanel">
        <button class="nl-panel-close" id="nlPanelClose">&times;</button>
        <p class="nl-panel-kicker">Newsletters</p>
        <div class="nl-panel-date" id="nlPanelDate"></div>
        <div id="nlPanelContent"></div>
    </div>

</div>

<th:block layout:fragment="scripts">
    <script th:inline="javascript">
        (() => {
            const data = {};
            /*[# th:each="nl : ${newsletters}"]*/
            /*[# th:if="${nl.sentAt != null}"]*/
            (function() {
                const key = /*[[${nl.sentAt.year}]]*/ 0
                    + '-' + /*[[${nl.sentAt.monthValue}]]*/ 0
                    + '-' + /*[[${nl.sentAt.dayOfMonth}]]*/ 0;
                if (!data[key]) data[key] = [];
                data[key].push({
                    group: /*[[${nl.group.name}]]*/ '',
                    groupId: /*[[${nl.group.id}]]*/ 0,
                    pdfUrl: /*[[${nl.pdfUrl}]]*/ ''
                });
            })();
            /*[/]*/
            /*[/]*/

            const MONTHS = [
                "January","February","March","April","May","June",
                "July","August","September","October","November","December"
            ];

            const today = new Date();
            let year = today.getFullYear();
            let month = today.getMonth();
            let selectedDay = null;

            const grid = document.getElementById("nlDateGrid");
            const monthLabel = document.getElementById("nlMonthLabel");
            const panel = document.getElementById("nlPanel");
            const overlay = document.getElementById("nlOverlay");
            const panelClose = document.getElementById("nlPanelClose");
            const panelDate = document.getElementById("nlPanelDate");
            const panelContent = document.getElementById("nlPanelContent");

            panelClose.addEventListener("click", closePanel);
            overlay.addEventListener("click", closePanel);

            function closePanel() {
                panel.classList.remove("active");
                overlay.classList.remove("active");
                selectedDay = null;
                render();
            }

            function openPanel(dayNum) {
                const isToday = dayNum === today.getDate()
                    && month === today.getMonth()
                    && year === today.getFullYear();

                panelDate.textContent = `${dayNum} ${MONTHS[month]} ${year}`;

                const key = `${year}-${month + 1}-${dayNum}`;
                const events = data[key] ?? [];

                panelContent.innerHTML = "";

                if (isToday) {
                    const link = document.createElement("a");
                    link.href = "/newsletters/current";
                    link.className = "nl-current-btn";
                    link.textContent = "→ View current newsletters";
                    panelContent.appendChild(link);
                }

                if (events.length === 0 && !isToday) {
                    const empty = document.createElement("p");
                    empty.className = "nl-panel-empty";
                    empty.textContent = "No newsletters released on this day.";
                    panelContent.appendChild(empty);
                } else {
                    events.forEach(ev => {
                        const item = document.createElement("div");
                        item.className = "nl-panel-item";

                        const name = document.createElement("div");
                        name.className = "nl-panel-group-name";
                        name.textContent = ev.group;
                        item.appendChild(name);

                        const links = document.createElement("div");
                        links.className = "nl-panel-links";

                        const htmlLink = document.createElement("a");
                        htmlLink.href = `/newsletter/group/${ev.groupId}`;
                        htmlLink.className = "nl-panel-link nl-panel-link--html";
                        htmlLink.textContent = "View newsletter";
                        links.appendChild(htmlLink);

                        if (ev.pdfUrl) {
                            const pdfLink = document.createElement("a");
                            pdfLink.href = ev.pdfUrl;
                            pdfLink.target = "_blank";
                            pdfLink.className = "nl-panel-link nl-panel-link--pdf";
                            pdfLink.textContent = "Download PDF";
                            links.appendChild(pdfLink);
                        }

                        item.appendChild(links);
                        panelContent.appendChild(item);
                    });
                }

                panel.classList.add("active");
                overlay.classList.add("active");
            }

            document.getElementById("nlPrevMonth").addEventListener("click", () => navigate(-1));
            document.getElementById("nlNextMonth").addEventListener("click", () => navigate(+1));

            function navigate(dir) {
                month += dir;
                if (month > 11) { month = 0; year++; }
                if (month < 0) { month = 11; year--; }
                render();
            }

            function render() {
                monthLabel.textContent = `${MONTHS[month]} ${year}`;
                grid.innerHTML = "";

                let startOffset = (new Date(year, month, 1).getDay() + 6) % 7;
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const totalCells = Math.ceil((startOffset + daysInMonth) / 7) * 7;

                for (let i = 0; i < totalCells; i++) {
                    const dayNum = i - startOffset + 1;
                    grid.appendChild(dayNum < 1 || dayNum > daysInMonth
                        ? buildEmptyCell(dayNum, daysInMonth)
                        : buildDayCell(dayNum)
                    );
                }

                const cells = grid.querySelectorAll(".nl-day");
                cells.forEach((cell, idx) => {
                    if (idx >= cells.length - 7) cell.style.borderBottom = "none";
                });
            }

            function buildEmptyCell(dayNum, daysInMonth) {
                const cell = document.createElement("div");
                cell.className = "nl-day nl-day--empty";
                const num = document.createElement("span");
                num.className = "nl-day-num";
                num.textContent = dayNum < 1
                    ? new Date(year, month, 0).getDate() + dayNum
                    : dayNum - daysInMonth;
                cell.appendChild(num);
                return cell;
            }

            function buildDayCell(dayNum) {
                const key = `${year}-${month + 1}-${dayNum}`;
                const events = data[key] ?? [];

                const isToday = dayNum === today.getDate()
                    && month === today.getMonth()
                    && year === today.getFullYear();

                const isSelected = selectedDay?.year === year
                    && selectedDay?.month === month
                    && selectedDay?.day === dayNum;

                const cell = document.createElement("div");
                cell.className = [
                    "nl-day nl-day--clickable",
                    isToday ? "nl-day--today" : "",
                    isSelected ? "nl-day--selected" : "",
                    events.length || isToday ? "nl-day--has-events" : "",
                ].filter(Boolean).join(" ");

                const num = document.createElement("span");
                num.className = "nl-day-num";
                num.textContent = dayNum;
                cell.appendChild(num);

                events.slice(0, 2).forEach((ev, idx) => {
                    const pill = document.createElement("span");
                    pill.className = `nl-event-pill${idx === 1 ? " nl-event-pill--light" : ""}`;
                    pill.textContent = ev.group;
                    cell.appendChild(pill);
                });

                if (events.length > 2) {
                    const more = document.createElement("span");
                    more.className = "nl-event-pill nl-event-pill--more";
                    more.textContent = `+${events.length - 2} more`;
                    cell.appendChild(more);
                }

                cell.addEventListener("click", () => {
                    selectedDay = {year, month, day: dayNum};
                    render();
                    openPanel(dayNum);
                });

                return cell;
            }
// ── Month/year picker ─────────────────────────────────────
const picker         = document.getElementById('nlPicker');
const pickerOverlay  = document.getElementById('nlPickerOverlay');
const pickerYear     = document.getElementById('nlPickerYear');
const pickerMonths   = document.getElementById('nlPickerMonths');
let pickerYearVal    = year;

const SHORT_MONTHS = ['Jan','Feb','Mar','Apr','May','Jun',
                      'Jul','Aug','Sep','Oct','Nov','Dec'];

function renderPicker() {
    pickerYear.textContent = pickerYearVal;
    pickerMonths.innerHTML = '';
    SHORT_MONTHS.forEach((m, i) => {
        const btn = document.createElement('button');
        btn.className = 'nl-picker-month-btn'
            + (i === month && pickerYearVal === year ? ' active' : '');
        btn.textContent = m;
        btn.addEventListener('click', () => {
            month = i;
            year = pickerYearVal;
            closePicker();
            render();
        });
        pickerMonths.appendChild(btn);
    });
}

function openPicker() {
    pickerYearVal = year;
    renderPicker();

    // Position picker below the month label
    const label = document.getElementById('nlMonthLabel');
    const rect = label.getBoundingClientRect();
    picker.style.top = (rect.bottom + window.scrollY + 8) + 'px';
    picker.style.left = (rect.left + rect.width / 2 - 140) + 'px';
    picker.style.display = 'block';
    pickerOverlay.classList.add('active');
}

function closePicker() {
    picker.style.display = 'none';
    pickerOverlay.classList.remove('active');
}

document.getElementById('nlMonthLabel').addEventListener('click', openPicker);
pickerOverlay.addEventListener('click', closePicker);

document.getElementById('nlPickerPrevYear').addEventListener('click', () => {
    pickerYearVal--;
    renderPicker();
});

document.getElementById('nlPickerNextYear').addEventListener('click', () => {
    pickerYearVal++;
    renderPicker();
});

// Close picker on escape
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closePicker();
});
            render();
        })();
    </script>
</th:block>

</body>
</html>
