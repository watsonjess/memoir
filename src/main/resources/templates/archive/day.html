<!--Made this as a fallback-->

<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<th:block layout:fragment="styles">
  <style>
    .day-header {
      margin-top: 32px;
      margin-bottom: 32px;
    }
    .day-kicker {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--memoir-accent);
      margin-bottom: 0.35rem;
    }
    .day-back {
      display: inline-block;
      font-size: 0.85rem;
      color: var(--memoir-muted);
      text-decoration: none;
      margin-bottom: 20px;
    }
    .day-back:hover { color: var(--memoir-ink); }
    .day-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 24px;
    }
    .day-card {
      border: 1px solid var(--memoir-border);
      border-radius: 16px;
      padding: 24px;
      background: var(--memoir-surface);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .day-card-group {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 600;
    }
    .day-card-links {
      display: flex;
      gap: 10px;
      margin-top: auto;
    }
    .day-card-link {
      flex: 1;
      text-align: center;
      padding: 10px 0;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 500;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .day-card-link:hover { opacity: 0.8; }
    .day-card-link--html {
      background: var(--memoir-accent);
      color: #fff;
    }
    .day-card-link--pdf {
      background: #f0f0f0;
      color: var(--memoir-ink);
    }
    .day-empty {
      text-align: center;
      padding: 80px 0;
      color: var(--memoir-muted);
    }
  </style>
</th:block>

<th:block layout:fragment="content">
  <a th:href="@{/archive}" class="day-back">
    <i class="bi bi-arrow-left"></i> Back to archive
  </a>

  <div class="day-header">
    <p class="day-kicker">Archive</p>
    <h1 class="memoir-page-title"
        th:text="${#temporals.format(date, 'dd MMMM yyyy')}"></h1>
    <p class="memoir-page-subtitle">Newsletters released on this day.</p>
  </div>

  <div th:if="${newsletters.isEmpty()}" class="day-empty">
    <p>No newsletters were released on this day.</p>
  </div>

  <div th:unless="${newsletters.isEmpty()}" class="day-grid">
    <div th:each="nl : ${newsletters}" class="day-card">
      <div class="day-card-group" th:text="${nl.group.name}"></div>
      <div class="day-card-links">
        <a th:href="@{/newsletter/group/{id}(id=${nl.group.id})}"
           class="day-card-link day-card-link--html">
          <i class="bi bi-eye"></i> View
        </a>
        <a th:if="${nl.pdfUrl != null}"
           th:href="${nl.pdfUrl}"
           target="_blank"
           class="day-card-link day-card-link--pdf">
          <i class="bi bi-download"></i> PDF
        </a>
      </div>
    </div>
  </div>
</th:block>

</html>
