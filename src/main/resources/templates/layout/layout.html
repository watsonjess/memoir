<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.w3.org/1999/xhtml"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle != null ? pageTitle + ' - Memoir' : 'Memoir'}"></title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"/>

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet"/>

    <!-- Google Fonts: Playfair Display + DM Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap"
          rel="stylesheet"/>

    <link th:href="@{/main.css}" rel="stylesheet"/>


    <!-- Page-specific styles slot -->
    <th:block layout:fragment="styles"></th:block>
</head>
<body>

<nav class="memoir-nav navbar navbar-expand sticky-top">
    <div class="container">

        <a class="navbar-brand" th:href="@{/}">Memoir</a>

        <button class="navbar-toggler border-0" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#memoirNav"
                aria-controls="memoirNav"
                aria-expanded="false"
                aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="memoirNav">
            <ul class="navbar-nav mx-auto mb-2 mb-md-0 gap-1" sec:authorize="isAuthenticated()">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/archive}">Newsletters</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/groups}">Events</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/groups}">Groups</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/friends}">Friends</a>
                </li>
            </ul>

            <div class="d-flex align-items-center gap-3 mb-2 mb-md-0" sec:authorize="isAuthenticated()">
                <div class="dropdown" id="memoirSearch">
                    <div class="memoir-search-trigger" id="memoirSearchTrigger">
                        <i class="bi bi-search memoir-search-bi-icon"></i>
                        <input type="text"
                               id="memoirSearchInput"
                               class="memoir-search-inline-input"
                               placeholder="Search…"
                               autocomplete="off"
                               aria-label="Search"/>
                    </div>
                    <div class="dropdown-menu memoir-search-dropdown w-100 mt-1 shadow-sm"
                         id="memoirSearchDropdown"
                         aria-live="polite">
                        <div id="memoirDropBody">
                            <span class="dropdown-item-text text-muted small">Start typing to search…</span>
                        </div>
                        <div id="memoirDropFooter" style="display:none;">
                            <div class="dropdown-divider"></div>
                            <a href="#" id="memoirSeeAll" class="dropdown-item small text-memoir-accent">
                                <i class="bi bi-search me-1"></i><span class="memoir-see-all-text">See all results for "<span id="memoirQueryLabel"></span>"</span>
                            </a>
                        </div>
                    </div>
                </div>
                <a th:href="@{/moments/new}" class="btn btn-memoir">
                    <i class="bi bi-plus-lg"></i> Add moment
                </a>

                <div class="dropdown">
                    <a href="#"
                       class="d-block"
                       data-bs-toggle="dropdown"
                       aria-expanded="false"
                       style="text-decoration: none;">


                        <img th:if="${loggedInUser != null and loggedInUser.profileImage != null and !#strings.isEmpty(loggedInUser.profileImage)}"
                             th:src="${loggedInUser.profileImage}"
                             alt="Profile"
                             class="rounded-circle memoir-avatar"
                             style="width: 36px; height: 36px; object-fit: cover;">
                        <span th:unless="${loggedInUser != null and loggedInUser.profileImage != null and !#strings.isEmpty(loggedInUser.profileImage)}"
                              class="memoir-avatar"
                              th:text="${#authentication.principal.attributes['given_name'] != null
                                         ? #authentication.principal.attributes['given_name'].substring(0,1).toUpperCase()
                                         : #authentication.principal.attributes['email'].substring(0,1).toUpperCase()}">
                        </span>
                    </a>

                    <ul class="dropdown-menu dropdown-menu-end mt-2 shadow-sm"
                        style="min-width: 180px; border-radius: 10px; border: 1px solid #f0d9c8;">

                        <!-- User info header -->
                        <li class="px-3 py-2">
                            <p class="mb-0 small fw-semibold"
                               th:text="${loggedInUser != null ? loggedInUser.firstname + ' ' + loggedInUser.lastname : ''}">Name</p>
                            <p class="mb-0 small" style="color: var(--memoir-muted);"
                               th:text="${loggedInUser != null ? loggedInUser.email : ''}">Email</p>
                        </li>
                        <li><hr class="dropdown-divider" style="border-color: #f0d9c8;"></li>

                        <li>
                            <a class="dropdown-item small" th:href="@{/profile/{username}(username=${loggedInUser.username})}">
                                <i class="bi bi-person me-2"></i>View profile
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item small" th:href="@{/profile/edit}">
                                <i class="bi bi-pencil me-2"></i>Edit profile
                            </a>
                        </li>
                        <li><hr class="dropdown-divider" style="border-color: #f0d9c8;"></li>

                    </ul>
                </div>


                <div sec:authorize="!isAuthenticated()">
                <a th:href="@{/oauth2/authorization/auth0}" class="btn btn-memoir">Login</a>
            </div>
        </div>

    </div>
</nav>

<!-- ── Main content ── -->
<main class="memoir-main">
    <div class="container">
        <div layout:fragment="content">
            <!-- Page content goes here -->
        </div>
    </div>
</main>

<!-- ── Footer ── -->
<footer class="memoir-footer">
    <div class="container d-flex justify-content-between align-items-center">
        <span>Memoir &copy; 2026</span>
    </div>
</footer>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/scripts/search-box.js}" defer></script>

<!-- Page-specific scripts slot -->
<th:block layout:fragment="scripts"></th:block>

</body>
</html>
