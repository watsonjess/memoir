<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
<div th:if="${!isFirstSetup}">
</div>
<main class="setup-main">
    <div class="create-profile-container">
        <h1 th:text="${isFirstSetup} ? 'Create your profile' : 'Edit profile'"></h1>

        <form class="form-container" th:action="@{/setup}" enctype="multipart/form-data" method="post">
            <input type="hidden" name="isFirstSetup" th:value="${isFirstSetup}">

            <div class="create-profile-form-div">
                <p>(+ Add profile picture here - placeholder)</p>
            </div>
            <div class="create-profile-form-div">
                <label for="firstName">First Name:</label>
                <input class="create-profile-input" type="text" id="firstName" name="firstName"
                        th:value="${user != null ? user.firstname : ''}" required>
            </div>
            <div class="create-profile-form-div">
                <label for="lastName">Last Name:</label>
                <input class="create-profile-input" type="text" id="lastName" name="lastName"
                       th:value="${user != null ? user.lastname : ''}" required>
            </div>
            <div class="create-profile-form-div">
                <label for="username">Username:</label>
                <input class="create-profile-input" type="text" id="username" name="username"
                       th:value="${user != null ? user.username : ''}" required>
            </div>
            <div class="create-profile-button-div">
                <button class="create-profile-button" name="updateUserBtn" type="submit"
                    th:text="${isFirstSetup} ? 'Continue' : 'Update'"> </button>
            </div>
        </form>
        <script src="/scripts/profile-picture-preview.js"></script>
    </div>
</main>
</body>
</html>
