<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<th:block layout:fragment="styles">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap"
        rel="stylesheet"/>
  <style>
    .memory-form-card {
      max-width: 560px;
      margin: 40px auto;
      background: #fff;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
      border: 1px solid var(--memoir-border);
    }
    .memory-form-kicker {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--memoir-accent);
      margin-bottom: 0.35rem;
    }
    .memory-form-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      margin-bottom: 4px;
    }
    .memory-form-subtitle {
      color: var(--memoir-muted);
      font-size: 0.9rem;
      margin-bottom: 32px;
    }
    .cover-preview-box {
      width: 100%;
      height: 200px;
      border: 2px dashed var(--memoir-border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
      margin-bottom: 24px;
      background: #fafaf8;
      transition: border-color 0.2s;
      position: relative;
    }
    .cover-preview-box:hover {
      border-color: var(--memoir-accent);
    }
    .cover-preview-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .cover-preview-placeholder {
      text-align: center;
      color: var(--memoir-muted);
      pointer-events: none;
    }
    .cover-preview-placeholder i {
      font-size: 2rem;
      margin-bottom: 8px;
      display: block;
    }

    /* Live preview polaroid */
    .polaroid-preview-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 28px;
    }
    .polaroid-preview {
      width: 160px;
      background: #fff;
      padding: 10px 10px 36px 10px;
      box-shadow: 3px 5px 18px rgba(0,0,0,0.18);
      border-radius: 2px;
      transform: rotate(-2deg);
    }
    .polaroid-preview-img {
      width: 100%;
      height: 130px;
      object-fit: cover;
      background: linear-gradient(135deg, #e8e0d8, #d5ccc2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #b0a898;
      font-size: 1.5rem;
    }
    .polaroid-preview-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .polaroid-preview-title {
      font-family: 'Caveat', cursive;
      font-size: 1.1rem;
      font-weight: 600;
      color: #333;
      text-align: center;
      margin-top: 8px;
    }

    .btn-memoir-submit {
      background-color: var(--memoir-accent);
      color: #fff;
      border: none;
      padding: 12px 32px;
      border-radius: 10px;
      font-size: 1rem;
      width: 100%;
      margin-top: 8px;
      transition: opacity 0.2s;
      cursor: pointer;
    }
    .btn-memoir-submit:hover { opacity: 0.88; }
  </style>
</th:block>

<th:block layout:fragment="content">
  <div class="memory-form-card">
    <p class="memory-form-kicker">New memory</p>
    <h1 class="memory-form-title">Create a memory</h1>
    <p class="memory-form-subtitle">Give it a name and a cover photo.</p>

    <!-- Live polaroid preview -->
    <div class="polaroid-preview-wrap">
      <div class="polaroid-preview">
        <div class="polaroid-preview-img" id="previewImgBox">
          <i class="bi bi-image" id="previewIcon"></i>
          <img id="previewImg" src="" alt="" style="display:none;
                         width:100%;height:100%;object-fit:cover;"/>
        </div>
        <div class="polaroid-preview-title" id="previewTitle">Memory name</div>
      </div>
    </div>

    <form th:action="@{/memories}" method="post" enctype="multipart/form-data">

      <!-- Cover image -->
      <div class="cover-preview-box"
           onclick="document.getElementById('coverInput').click()">
        <div class="cover-preview-placeholder" id="coverPlaceholder">
          <i class="bi bi-image"></i>
          <p class="mb-0 small">Click to add a cover photo (optional)</p>
        </div>
        <img id="coverPreview" src="" alt=""
             style="display:none;width:100%;height:100%;object-fit:cover;"/>
      </div>
      <input type="file" id="coverInput" name="coverImage"
             accept="image/*" style="display:none;"/>

      <!-- Name -->
      <div class="mb-3">
        <label class="form-label fw-500" for="name">Memory name</label>
        <input type="text"
               class="form-control"
               id="name"
               name="name"
               placeholder="e.g. House share, Summer 2024..."
               required/>
      </div>

      <!-- Description -->
      <div class="mb-4">
        <label class="form-label fw-500" for="description">
          Description
          <span class="text-muted fw-normal">(optional)</span>
        </label>
        <textarea class="form-control"
                  id="description"
                  name="description"
                  rows="3"
                  placeholder="What is this memory about?"></textarea>
      </div>

      <button type="submit" class="btn-memoir-submit">
        Create memory
      </button>
    </form>
  </div>
</th:block>

<th:block layout:fragment="scripts">
  <script>
    // Live preview — name
    document.getElementById('name').addEventListener('input', function() {
      const val = this.value.trim();
      document.getElementById('previewTitle').textContent =
              val.length > 0 ? val : 'Memory name';
    });

    // Live preview — cover image
    document.getElementById('coverInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(event) {
        // Update cover preview box
        document.getElementById('coverPreview').src = event.target.result;
        document.getElementById('coverPreview').style.display = 'block';
        document.getElementById('coverPlaceholder').style.display = 'none';

        // Update polaroid preview
        document.getElementById('previewImg').src = event.target.result;
        document.getElementById('previewImg').style.display = 'block';
        document.getElementById('previewIcon').style.display = 'none';
      };
      reader.readAsDataURL(file);
    });
  </script>
</th:block>

</html>
