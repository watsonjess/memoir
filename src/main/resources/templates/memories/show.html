<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/layout}">
<head>
  <title>Memory</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&display=swap" rel="stylesheet"/>
</head>
<body>

<div layout:fragment="content">

  <div class="polaroid-photo-wrap mb-0">
    <img th:if="${memory.coverImageUrl != null}"
         th:src="${memory.coverImageUrl}"
         class="polaroid-photo" alt="Cover"/>
    <div th:unless="${memory.coverImageUrl != null}"
         class="polaroid-photo-placeholder">
      <i class="bi bi-image" style="font-size: 3rem; color: var(--memoir-muted);"></i>
    </div>
  </div>

  <div class="polaroid-strip mb-4">
    <div class="text-center position-relative mb-4">
      <p class="polaroid-title" th:text="${memory.name}">Memory name</p>
      <p class="polaroid-subtitle" th:text="${memory.description}" th:if="${memory.description}"></p>
      <form th:if="${isOwner}"
            th:action="@{/memories/{id}/delete(id=${memory.id})}" method="post"
            onsubmit="return confirm('Are you sure you want to delete this memory?')"
            style="position: absolute; top: 0; right: 0;">
        <button type="submit" class="btn btn-sm btn-outline-danger">
          <i class="bi bi-trash"></i>
        </button>
      </form>
    </div>

    <div class="mb-4 d-flex flex-wrap gap-2 align-items-center">
      <span class="small" style="color: var(--memoir-muted);">
        <i class="bi bi-people me-1"></i> Members:
      </span>
      <div th:each="member : ${members}"
           class="d-flex align-items-center gap-2 px-3 py-1 rounded-pill"
           style="background: var(--memoir-cream); border: 1px solid var(--memoir-border); font-size: 0.8rem;">
        <img th:src="${member.user.profileImage != null and !#strings.isEmpty(member.user.profileImage) ? member.user.profileImage : '/images/default-picture.png'}"
             class="rounded-circle"
             style="width: 22px; height: 22px; object-fit: cover;" alt=""/>
        <span th:text="${member.user.firstname}"></span>
        <span th:if="${member.role == 'owner'}"
              style="font-size: 0.65rem; color: var(--memoir-accent);">owner</span>
      </div>
      <form th:if="${isOwner}"
            th:action="@{/memories/{id}/invite(id=${memory.id})}" method="post"
            class="d-flex gap-2 ms-auto">
        <input type="text" class="form-control form-control-sm"
               name="username" placeholder="Invite by username…" required
               style="width: 180px;"/>
        <button type="submit" class="btn btn-memoir btn-sm">
          <i class="bi bi-person-plus me-1"></i> Invite
        </button>
      </form>
    </div>

    <div class="mb-4">
      <h6 class="mb-3" style="font-family: 'Playfair Display', serif;">Add a thought</h6>
      <form th:action="@{/memories/{id}/thoughts(id=${memory.id})}"
            method="post" enctype="multipart/form-data">
        <div class="mb-3">
          <textarea class="form-control" name="content" rows="2"
                    placeholder="What do you remember?"></textarea>
        </div>
        <div class="d-flex gap-3 align-items-center">
          <label class="btn btn-sm btn-outline-secondary mb-0" for="thoughtImage">
            <i class="bi bi-image me-1"></i> Add a photo
            <input type="file" id="thoughtImage" name="image" accept="image/*"
                   class="d-none" onchange="previewThoughtImage(this)"/>
          </label>
          <span id="thoughtImageName" class="small" style="color: var(--memoir-muted);"></span>
          <button type="submit" class="btn btn-memoir btn-sm ms-auto">
            <i class="bi bi-plus-lg me-1"></i> Submit
          </button>
        </div>
        <div id="thoughtImagePreview" class="mt-3" style="display:none;">
          <img id="thoughtPreviewImg" src="" alt="Preview"
               style="max-height: 120px; border-radius: 8px; object-fit: cover;"/>
          <button type="button" onclick="clearThoughtImage()"
                  class="btn btn-sm btn-outline-secondary ms-2">Remove</button>
        </div>
      </form>
    </div>

    <div class="feed-controls" id="thoughts-section">
      <span class="feed-week-label" th:text="${#lists.size(thoughts)} + ' thoughts'"></span>
      <div style="display:flex; gap:16px; align-items:center; flex-wrap:wrap;">

        <div class="feed-toggle-group" th:if="${groupBy != 'person'}">
          <span class="feed-toggle-label">Order</span>
          <a th:href="@{/memories/{id}(id=${memory.id},order='desc',layout=${layout},groupBy=${groupBy},filter=${filter})}"
             th:classappend="${order == 'desc'} ? 'active' : ''"
             class="feed-btn">
            <i class="bi bi-sort-down"></i> Newest
          </a>
          <a th:href="@{/memories/{id}(id=${memory.id},order='asc',layout=${layout},groupBy=${groupBy},filter=${filter})}"
             th:classappend="${order == 'asc'} ? 'active' : ''"
             class="feed-btn">
            <i class="bi bi-sort-up"></i> Oldest
          </a>
        </div>

        <div class="feed-toggle-group">
          <span class="feed-toggle-label">Filter</span>
          <a th:href="@{/memories/{id}(id=${memory.id},order=${order},layout=${layout},groupBy=${groupBy},filter='all')}"
             th:classappend="${filter == 'all'} ? 'active' : ''"
             class="feed-btn">All</a>
          <a th:href="@{/memories/{id}(id=${memory.id},order=${order},layout=${layout},groupBy=${groupBy},filter='photo')}"
             th:classappend="${filter == 'photo'} ? 'active' : ''"
             class="feed-btn">
            <i class="bi bi-image"></i> Photos
          </a>
          <a th:href="@{/memories/{id}(id=${memory.id},order=${order},layout=${layout},groupBy=${groupBy},filter='text')}"
             th:classappend="${filter == 'text'} ? 'active' : ''"
             class="feed-btn">
            <i class="bi bi-chat-text"></i> Text
          </a>
        </div>

        <div class="feed-toggle-group">
          <span class="feed-toggle-label">Group</span>
          <a th:href="@{/memories/{id}(id=${memory.id},order=${order},layout=${layout},groupBy='none',filter=${filter})}"
             th:classappend="${groupBy == 'none'} ? 'active' : ''"
             class="feed-btn">
            <i class="bi bi-calendar3"></i> By date
          </a>
          <a th:href="@{/memories/{id}(id=${memory.id},order=${order},layout=${layout},groupBy='person',filter=${filter})}"
             th:classappend="${groupBy == 'person'} ? 'active' : ''"
             class="feed-btn">
            <i class="bi bi-person"></i> By person
          </a>
        </div>

        <div class="feed-toggle-group">
          <span class="feed-toggle-label">View</span>
          <a th:href="@{/memories/{id}(id=${memory.id},order=${order},layout='grid',groupBy=${groupBy},filter=${filter})}"
             th:classappend="${layout == 'grid'} ? 'active' : ''"
             class="feed-btn">
            <i class="bi bi-grid"></i> Grid
          </a>
          <a th:href="@{/memories/{id}(id=${memory.id},order=${order},layout='masonry',groupBy=${groupBy},filter=${filter})}"
             th:classappend="${layout == 'masonry'} ? 'active' : ''"
             class="feed-btn">
            <i class="bi bi-columns-gap"></i> Masonry
          </a>
          <a th:href="@{/memories/{id}(id=${memory.id},order=${order},layout='feed',groupBy=${groupBy},filter=${filter})}"
             th:classappend="${layout == 'feed'} ? 'active' : ''"
             class="feed-btn">
            <i class="bi bi-list"></i> Feed
          </a>
        </div>

      </div>
    </div>

    <div th:if="${#lists.isEmpty(thoughts)}" class="feed-empty">
      <i class="bi bi-chat-heart"></i>
      <p>No thoughts yet — add the first one!</p>
    </div>

    <div th:unless="${#lists.isEmpty(thoughts)}">

      <div th:if="${groupBy == 'person'}">
        <div th:each="entry : ${thoughtsByUser}" class="user-group-section">
          <div class="user-group-header">
            <div class="user-group-avatar"
                 th:text="${entry.key.firstname.substring(0,1).toUpperCase()}"></div>
            <span class="user-group-name"
                  th:text="${entry.key.firstname + ' ' + entry.key.lastname}"></span>
            <span class="user-group-count"
                  th:text="${entry.value.size() + ' thought' + (entry.value.size() == 1 ? '' : 's')}"></span>
          </div>

          <div th:if="${layout == 'grid' or layout == 'masonry'}"
               th:class="${layout == 'masonry'} ? 'moments-masonry' : 'moments-grid'">
            <div th:each="thought : ${entry.value}"
                 class="thought-card moment-card"
                 th:data-thought-id="${thought.id}"
                 onclick="openThoughtPanel(this)">
              <img th:if="${thought.imageUrl != null}"
                   th:src="${thought.imageUrl}"
                   class="moment-card-img"
                   th:alt="${thought.content}"/>
              <div th:unless="${thought.imageUrl != null}"
                   style="background: var(--memoir-cream); height: 120px; display: flex; align-items: center; padding: 20px;">
                <i class="bi bi-quote" style="font-size: 1.5rem; color: var(--memoir-accent); opacity: 0.4; margin-right: 10px; flex-shrink: 0;"></i>
                <p class="small mb-0" th:text="${thought.content}"
                   style="overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;"></p>
              </div>
              <div class="moment-card-body">
                <p class="moment-card-content" th:text="${thought.content}"></p>
                <div class="moment-card-meta">
                  <span th:text="${#temporals.format(thought.createdAt, 'd MMM yyyy')}"></span>
                </div>
              </div>
            </div>
          </div>

          <div th:if="${layout == 'feed'}" class="moments-feed">
            <div th:each="thought : ${entry.value}"
                 class="thought-card moment-feed-card"
                 th:data-thought-id="${thought.id}"
                 onclick="openThoughtPanel(this)">
              <div class="moment-feed-header">
                <div class="moment-feed-avatar"
                     th:text="${entry.key.firstname.substring(0,1).toUpperCase()}"></div>
                <div>
                  <div class="moment-feed-user"
                       th:text="${entry.key.firstname + ' ' + entry.key.lastname}"></div>
                  <div class="moment-feed-date"
                       th:text="${#temporals.format(thought.createdAt, 'd MMMM yyyy')}"></div>
                </div>
              </div>
              <img th:if="${thought.imageUrl != null}"
                   th:src="${thought.imageUrl}"
                   class="moment-feed-img"
                   th:alt="${thought.content}"/>
              <div class="moment-feed-body" th:if="${thought.content}">
                <p class="moment-feed-content" th:text="${thought.content}"></p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div th:if="${groupBy != 'person' and layout == 'grid'}" class="moments-grid">
        <div th:each="thought : ${thoughts}"
             class="thought-card moment-card"
             th:data-thought-id="${thought.id}"
             onclick="openThoughtPanel(this)">
          <img th:if="${thought.imageUrl != null}"
               th:src="${thought.imageUrl}"
               class="moment-card-img"
               th:alt="${thought.content}"/>
          <div th:unless="${thought.imageUrl != null}"
               style="background: var(--memoir-cream); height: 120px; display: flex; align-items: center; padding: 20px;">
            <i class="bi bi-quote" style="font-size: 1.5rem; color: var(--memoir-accent); opacity: 0.4; margin-right: 10px; flex-shrink: 0;"></i>
            <p class="small mb-0" th:text="${thought.content}"
               style="overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;"></p>
          </div>
          <div class="moment-card-body">
            <div class="moment-card-user"
                 th:text="${thought.createdBy.firstname + ' ' + thought.createdBy.lastname}"></div>
            <p class="moment-card-content"
               th:if="${thought.content != null and thought.imageUrl != null}"
               th:text="${thought.content}"></p>
            <div class="moment-card-meta">
              <span th:text="${#temporals.format(thought.createdAt, 'd MMM yyyy')}"></span>
            </div>
          </div>
        </div>
      </div>

      <div th:if="${groupBy != 'person' and layout == 'masonry'}" class="moments-masonry">
        <div th:each="thought : ${thoughts}"
             class="thought-card moment-card"
             th:data-thought-id="${thought.id}"
             onclick="openThoughtPanel(this)">
          <img th:if="${thought.imageUrl != null}"
               th:src="${thought.imageUrl}"
               class="moment-card-img"
               style="height: auto;"
               th:alt="${thought.content}"/>
          <div th:unless="${thought.imageUrl != null}"
               style="background: var(--memoir-cream); min-height: 100px; display: flex; align-items: center; padding: 20px;">
            <i class="bi bi-quote" style="font-size: 1.5rem; color: var(--memoir-accent); opacity: 0.4; margin-right: 10px; flex-shrink: 0;"></i>
            <p class="small mb-0" th:text="${thought.content}"
               style="overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;"></p>
          </div>
          <div class="moment-card-body">
            <div class="moment-card-user"
                 th:text="${thought.createdBy.firstname + ' ' + thought.createdBy.lastname}"></div>
            <p class="moment-card-content"
               th:if="${thought.content != null and thought.imageUrl != null}"
               th:text="${thought.content}"></p>
            <div class="moment-card-meta">
              <span th:text="${#temporals.format(thought.createdAt, 'd MMM yyyy')}"></span>
            </div>
          </div>
        </div>
      </div>

      <div th:if="${groupBy != 'person' and layout == 'feed'}" class="moments-feed">
        <div th:each="thought : ${thoughts}"
             class="thought-card moment-feed-card"
             th:data-thought-id="${thought.id}"
             onclick="openThoughtPanel(this)">
          <div class="moment-feed-header">
            <div class="moment-feed-avatar"
                 th:text="${thought.createdBy.firstname.substring(0,1).toUpperCase()}"></div>
            <div>
              <div class="moment-feed-user"
                   th:text="${thought.createdBy.firstname + ' ' + thought.createdBy.lastname}"></div>
              <div class="moment-feed-date"
                   th:text="${#temporals.format(thought.createdAt, 'd MMMM yyyy')}"></div>
            </div>
          </div>
          <img th:if="${thought.imageUrl != null}"
               th:src="${thought.imageUrl}"
               class="moment-feed-img"
               th:alt="${thought.content}"/>
          <div class="moment-feed-body" th:if="${thought.content}">
            <p class="moment-feed-content" th:text="${thought.content}"></p>
          </div>
        </div>
      </div>

    </div>

  </div>

  <div class="nl-panel-overlay" id="thoughtOverlay"></div>
  <div class="nl-panel" id="thoughtPanel">
    <button class="nl-panel-close" id="thoughtPanelClose">&times;</button>
    <p class="nl-panel-kicker">Thought</p>
    <div id="thoughtPanelContent"></div>
  </div>

</div>

<th:block layout:fragment="styles">
  <style>
    .feed-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--memoir-border);
    }
    .feed-week-label { font-size: 0.85rem; color: var(--memoir-muted); }
    .feed-toggle-group { display: flex; gap: 6px; align-items: center; }
    .feed-toggle-label { font-size: 0.75rem; color: var(--memoir-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-right: 4px; }
    .feed-btn {
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--memoir-border);
      background: var(--memoir-surface);
      color: var(--memoir-muted);
      font-size: 0.78rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.15s;
      cursor: pointer;
      white-space: nowrap;
    }
    .feed-btn:hover { border-color: var(--memoir-accent); color: var(--memoir-accent); }
    .feed-btn.active { background: var(--memoir-accent); border-color: var(--memoir-accent); color: #fff; }
    .moments-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .moments-masonry { columns: 3; column-gap: 16px; }
    @media (max-width: 991px) { .moments-masonry { columns: 2; } }
    @media (max-width: 575px) { .moments-masonry { columns: 1; } }
    .moments-masonry .moment-card { break-inside: avoid; margin-bottom: 16px; display: block; }
    .moments-masonry .moment-card-img { height: auto; }
    .moment-card { border-radius: 12px; overflow: hidden; background: var(--memoir-surface); border: 1px solid var(--memoir-border); color: inherit; transition: transform 0.2s, box-shadow 0.2s; display: block; cursor: pointer; }
    .moment-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
    .moment-card-img { width: 100%; height: 200px; object-fit: cover; }
    .moment-card-body { padding: 14px 16px; }
    .moment-card-user { font-size: 0.78rem; font-weight: 600; color: var(--memoir-accent); margin-bottom: 4px; }
    .moment-card-content { font-size: 0.9rem; color: var(--memoir-ink); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .moment-card-meta { font-size: 0.75rem; color: var(--memoir-muted); margin-top: 8px; display: flex; gap: 12px; }
    .moments-feed { display: flex; flex-direction: column; gap: 20px; max-width: 680px; margin: 0 auto; }
    .moment-feed-card { background: var(--memoir-surface); border: 1px solid var(--memoir-border); border-radius: 16px; overflow: hidden; cursor: pointer; }
    .moment-feed-header { display: flex; align-items: center; gap: 10px; padding: 14px 18px; }
    .moment-feed-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--memoir-accent); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 600; flex-shrink: 0; }
    .moment-feed-user { font-size: 0.88rem; font-weight: 600; }
    .moment-feed-date { font-size: 0.75rem; color: var(--memoir-muted); }
    .moment-feed-img { width: 100%; max-height: 480px; object-fit: cover; }
    .moment-feed-body { padding: 14px 18px; }
    .moment-feed-content { font-size: 0.95rem; line-height: 1.7; color: var(--memoir-ink); }
    .user-group-section { margin-bottom: 40px; }
    .user-group-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--memoir-border); }
    .user-group-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--memoir-accent); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 600; flex-shrink: 0; }
    .user-group-name { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 600; }
    .user-group-count { font-size: 0.78rem; color: var(--memoir-muted); margin-left: auto; }
    .feed-empty { text-align: center; padding: 80px 0; color: var(--memoir-muted); }
    .feed-empty i { font-size: 2.5rem; margin-bottom: 16px; display: block; }
    .nl-panel-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 100; }
    .nl-panel-overlay.active { display: block; }
    .nl-panel { position: fixed; top: 60px; right: -420px; width: 400px; max-width: 95vw; height: calc(100vh - 60px); background: #fff; box-shadow: -4px 0 24px rgba(0,0,0,0.12); z-index: 1019; transition: right 0.3s ease; padding: 32px 28px; overflow-y: auto; }
    .nl-panel.active { right: 0; }
    .nl-panel-close { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--memoir-muted); line-height: 1; }
    .nl-panel-close:hover { color: var(--memoir-ink); }
    .nl-panel-kicker { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--memoir-accent); margin-bottom: 24px; font-weight: 500; }
  </style>
</th:block>

<th:block layout:fragment="scripts">
  <script th:inline="javascript">
    const thoughtData = [];
    /*[# th:each="thought : ${thoughts}"]*/
    thoughtData.push({
      id:        /*[[${thought.id}]]*/ 0,
      content:   /*[[${thought.content}]]*/ '',
      imageUrl:  /*[[${thought.imageUrl}]]*/ null,
      author:    /*[[${thought.createdBy.firstname + ' ' + thought.createdBy.lastname}]]*/ '',
      authorImg: /*[[${thought.createdBy.profileImage}]]*/ null,
      date:      /*[[${#temporals.format(thought.createdAt, 'd MMMM yyyy')}]]*/ ''
    });
    /*[/]*/

    const thoughtLookup = {};
    thoughtData.forEach(t => thoughtLookup[t.id] = t);

    const panel   = document.getElementById('thoughtPanel');
    const overlay = document.getElementById('thoughtOverlay');

    document.getElementById('thoughtPanelClose').addEventListener('click', closeThoughtPanel);
    overlay.addEventListener('click', closeThoughtPanel);

    function openThoughtPanel(card) {
      const id = parseInt(card.dataset.thoughtId);
      const t  = thoughtLookup[id];
      if (!t) return;

      const content = document.getElementById('thoughtPanelContent');
      content.innerHTML = '';

      if (t.imageUrl) {
        const img = document.createElement('img');
        img.src = t.imageUrl;
        img.alt = t.content || '';
        img.style.cssText = 'width:100%; border-radius:12px; margin-bottom:16px; object-fit:cover; max-height:300px; display:block;';
        content.appendChild(img);
      }

      const avatarSrc = t.authorImg || '/images/default-picture.png';
      const authorRow = document.createElement('div');
      authorRow.style.cssText = 'display:flex; align-items:center; gap:10px; margin-bottom:16px;';
      authorRow.innerHTML = `
        <img src="${avatarSrc}" alt=""
             style="width:32px; height:32px; border-radius:50%; object-fit:cover; border:2px solid #f0d9c8;"/>
        <div>
          <div style="font-size:0.88rem; font-weight:600; color:var(--memoir-accent);">${t.author}</div>
          <div style="font-size:0.75rem; color:var(--memoir-muted);">${t.date}</div>
        </div>`;
      content.appendChild(authorRow);

      if (t.content) {
        const p = document.createElement('p');
        p.style.cssText = 'font-size:0.95rem; line-height:1.75; color:var(--memoir-ink); white-space:pre-wrap;';
        p.textContent = t.content;
        content.appendChild(p);
      }

      panel.classList.add('active');
      overlay.classList.add('active');
    }

    function closeThoughtPanel() {
      panel.classList.remove('active');
      overlay.classList.remove('active');
    }

    function previewThoughtImage(input) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = e => {
          document.getElementById('thoughtPreviewImg').src = e.target.result;
          document.getElementById('thoughtImagePreview').style.display = 'block';
          document.getElementById('thoughtImageName').textContent = input.files[0].name;
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    function clearThoughtImage() {
      document.getElementById('thoughtImage').value = '';
      document.getElementById('thoughtImagePreview').style.display = 'none';
      document.getElementById('thoughtImageName').textContent = '';
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeThoughtPanel();
    });
      if (window.location.search.includes('order=') ||
            window.location.search.includes('filter=') ||
            window.location.search.includes('groupBy=') ||
            window.location.search.includes('layout=')) {
