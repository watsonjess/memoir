<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page not found - Memoir</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link th:href="@{/css/main.css}" rel="stylesheet"/>
</head>
<body>

<nav class="memoir-nav navbar navbar-expand sticky-top">
  <div class="container">
    <a class="navbar-brand" th:href="@{/}">Memoir</a>
  </div>
</nav>

<main class="memoir-main">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 text-center py-5">

        <h1 class="error-number">404</h1>

        <h2 class="memoir-page-title mb-2">Page not found</h2>

        <p class="memoir-page-subtitle mb-4">
          The page you're looking for doesn't exist or may have been moved.
        </p>

        <div class="d-flex justify-content-center gap-3">
          <a th:href="@{/}" class="btn btn-memoir">
            <i class="bi bi-house me-1"></i> Go home
          </a>
          <a th:href="@{/groups}" class="btn btn-outline-secondary">
            <i class="bi bi-people me-1"></i> My groups
          </a>
        </div>

      </div>
    </div>
  </div>
</main>

<footer class="memoir-footer">
  <div class="container d-flex justify-content-between align-items-center">
    <span>Memoir &copy; 2026</span>
  </div>
</footer>

<style>
  .error-number {
    font-size: 8rem;
    font-family: 'Playfair Display', serif;
    color: #E4E1DA;
    line-height: 1;
    margin-bottom: 1rem;
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
